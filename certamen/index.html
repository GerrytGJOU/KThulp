<style>
:root{
  /* gedeelde basis */
  --stone:#16110c; --stone2:#221a12; --stone3:#2f241a; --stone4:#3d2f20;
  --cream:#f3e9d2; --muted:#b9a883; --muted2:#8a7a5c; --ink:#1a130b;
  --green:#3f7d3a; --green-bright:#6db862; --shadow:rgba(0,0,0,.5);
  /* THEMA ROMEINS (touwtrekken / standaard) */
  --acc:#5a120c; --acc2:#7d1a10; --hi:#d4af37; --hi-bright:#f0cf6b; --hi-dim:#9c7c1f;
  --glowA:212,175,55; --glowB:168,38,26;
  --teamA:#b03a2e; --teamB:#2e6fb0;
}
/* THEMA GRIEKS (marathon) */
body.greek{
  --stone:#0a1626; --stone2:#0f2036; --stone3:#152c49; --stone4:#1f3c5e;
  --cream:#eef3f7; --muted:#9fb6cc; --muted2:#6f8aa6;
  --acc:#12365c; --acc2:#1a4a7a; --hi:#e0b15a; --hi-bright:#f2cf86; --hi-dim:#a8843c;
  --glowA:224,177,90; --glowB:63,124,196;
  --teamA:#c4633b; --teamB:#3f7cc4;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Palatino Linotype',Palatino,'Book Antiqua','Noto Serif',Georgia,serif;
  background:
    radial-gradient(ellipse at 50% -10%, rgba(var(--glowA),.10), transparent 55%),
    radial-gradient(ellipse at 50% 120%, rgba(var(--glowB),.16), transparent 55%),
    linear-gradient(160deg,var(--stone) 0%,var(--stone2) 50%,var(--stone) 100%);
  background-attachment:fixed; color:var(--cream); min-height:100%;
  overflow-x:hidden; -webkit-font-smoothing:antialiased; position:relative;
}
.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:16px 16px 40px;min-height:100vh;display:flex;flex-direction:column}
.disp,h1,h2,h3{font-family:'Optima','Palatino Linotype',Palatino,'Noto Serif',Georgia,serif;letter-spacing:.03em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
.hidden{display:none!important}
.grow{flex:1}

/* brand */
.brand{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.brand .mark{width:48px;height:48px;flex:0 0 auto}
.brand .t{font-family:'Optima','Palatino Linotype',Palatino,serif;font-weight:800;font-size:26px;color:var(--hi);line-height:1;text-shadow:0 2px 6px var(--shadow)}
.brand .s{font-size:11px;letter-spacing:.32em;color:var(--muted);margin-top:4px;text-transform:uppercase}
.brand .coins{margin-left:auto;display:flex;align-items:center;gap:6px;background:linear-gradient(180deg,var(--stone3),var(--stone2));border:1px solid var(--hi-dim);border-radius:11px;padding:7px 12px}
.brand .coins b{font-size:15px;color:var(--hi-bright)}
.brand .coins small{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* labels & dividers */
.eyebrow{display:flex;align-items:center;gap:12px;margin:6px 0 14px;color:var(--hi);font-size:12px;letter-spacing:.28em;text-transform:uppercase}
.eyebrow::before,.eyebrow::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--hi-dim),transparent)}
.eyebrow.l::before{display:none}.eyebrow.l{justify-content:flex-start}
.note{font-size:14px;color:var(--muted);line-height:1.55}
.note.warn{color:#e8b96b}
.pill{display:inline-block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:rgba(var(--glowA),.14);color:var(--hi-bright);border:1px solid var(--hi-dim);border-radius:20px;padding:3px 11px}

/* panels & tiles */
.panel{background:linear-gradient(170deg,rgba(47,36,26,.55),rgba(34,26,18,.55));border:1px solid var(--stone4);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 4px 16px var(--shadow)}
body.greek .panel{background:linear-gradient(170deg,rgba(21,44,73,.55),rgba(15,32,54,.55))}
.panel h3{font-size:15px;color:var(--hi);margin-bottom:10px;letter-spacing:.05em}
.tile{position:relative;display:block;width:100%;border-radius:16px;padding:22px 20px;text-align:left;color:var(--cream);
  background:linear-gradient(170deg,var(--stone3),var(--stone2));border:1px solid var(--stone4);
  box-shadow:0 4px 16px var(--shadow);transition:transform .14s,border-color .14s,box-shadow .14s;overflow:hidden;margin-bottom:13px}
.tile:active{transform:scale(.985)}
.tile:hover{border-color:var(--hi-dim);box-shadow:0 6px 22px var(--shadow),0 0 0 1px rgba(var(--glowA),.25)}
.tile .ic{width:44px;height:44px;margin-bottom:12px;color:var(--hi)}
.tile h3{font-size:20px;color:var(--cream);margin-bottom:4px}
.tile p{font-size:14px;color:var(--muted);line-height:1.4}
.tile .corner{position:absolute;top:-16px;right:-12px;width:88px;height:88px;opacity:.08;color:var(--hi)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:560px){.two{grid-template-columns:1fr}}

/* forms */
label.fld{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:0 0 7px}
input[type=text],input[type=number],select,textarea{
  width:100%;background:rgba(0,0,0,.32);border:1px solid var(--stone4);border-radius:11px;color:var(--cream);
  padding:13px 14px;font-size:17px;transition:border-color .15s,box-shadow .15s}
textarea{min-height:130px;resize:vertical;line-height:1.5;font-size:15px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--hi-dim);box-shadow:0 0 0 3px rgba(var(--glowA),.18)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:120px}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border-radius:13px;padding:15px 24px;
  font-family:'Optima','Palatino Linotype',Palatino,serif;font-weight:700;font-size:16px;letter-spacing:.04em;
  transition:transform .12s,filter .12s,box-shadow .12s}
.btn:active{transform:scale(.97)}
.btn svg{width:19px;height:19px}
.btn-gold{background:linear-gradient(180deg,var(--hi-bright),var(--hi),var(--hi-dim));color:#2a1d05;box-shadow:0 4px 14px rgba(var(--glowA),.3),inset 0 1px 0 rgba(255,255,255,.4)}
.btn-gold:hover{filter:brightness(1.06)}
.btn-acc{background:linear-gradient(180deg,var(--acc2),var(--acc));color:var(--cream);box-shadow:0 4px 14px rgba(var(--glowB),.35),inset 0 1px 0 rgba(255,255,255,.18)}
.btn-ghost{background:var(--stone3);border:1px solid var(--stone4);color:var(--cream)}
.btn-ghost:hover{border-color:var(--hi-dim)}
.btn-block{width:100%}
.btn.lg{font-size:19px;padding:18px 26px}
.btn[disabled]{opacity:.45;pointer-events:none}
.btnrow{display:flex;gap:11px;flex-wrap:wrap;margin-top:6px}

/* chips */
.chips{display:flex;gap:9px;flex-wrap:wrap}
.chip{border-radius:22px;padding:9px 15px;font-family:'Optima',Palatino,serif;font-size:14px;white-space:nowrap;
  border:1px solid var(--stone4);background:var(--stone3);color:var(--cream)}
.chip.on{border-color:var(--hi-bright);background:linear-gradient(180deg,var(--hi),var(--hi-dim));color:#2a1d05}
.chip small{opacity:.7;font-size:12px;margin-left:3px}

/* iPad-veilige bestandskiezer (zichtbaar input in label) */
.filepick{position:relative;display:flex;width:100%;align-items:center;justify-content:center;gap:9px;border-radius:13px;
  padding:14px 22px;font-family:'Optima',Palatino,serif;font-weight:700;font-size:15px;cursor:pointer;overflow:hidden;
  background:var(--stone3);border:1px solid var(--stone4);color:var(--cream);transition:border-color .12s}
.filepick:hover{border-color:var(--hi-dim)}
.filepick svg{width:18px;height:18px}
.filepick input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:0}

/* back header */
.scrhead{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.back{width:44px;height:44px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;border-radius:12px;background:var(--stone3);border:1px solid var(--stone4);color:var(--hi)}
.back:active{transform:scale(.92)} .back svg{width:21px;height:21px}
.scrhead h2{font-size:22px;color:var(--hi-bright);flex:1}

/* lobby code */
.codecard{text-align:center;border-radius:20px;padding:26px 20px;margin-bottom:16px;
  background:linear-gradient(135deg,rgba(var(--glowB),.25),rgba(0,0,0,.25));border:1px solid var(--hi-dim);
  box-shadow:0 6px 24px var(--shadow),inset 0 1px 0 rgba(var(--glowA),.18)}
.codecard .lbl{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--hi)}
.codecard .code{font-family:'Optima',Palatino,serif;font-weight:800;font-size:62px;letter-spacing:.18em;color:var(--cream);line-height:1.05;margin:4px 0 6px}
.codecard .url{font-size:13px;color:var(--muted);word-break:break-all}

/* player chips in lobby */
.plist{display:flex;flex-wrap:wrap;gap:10px}
.ptag{display:flex;align-items:center;gap:8px;border-radius:24px;padding:7px 13px 7px 7px;background:var(--stone3);border:1px solid var(--stone4);font-size:15px}
.ptag .av{width:30px;height:30px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.ptag.bot{opacity:.85;border-style:dashed}

/* QUESTION CARD */
.qcard{background:linear-gradient(165deg,#fbf3df,#ecdcbb);color:var(--ink);border-radius:20px;padding:26px 20px;text-align:center;
  box-shadow:0 10px 30px var(--shadow),inset 0 0 0 1px rgba(122,80,20,.25);position:relative;overflow:hidden;margin-bottom:14px}
body.greek .qcard{background:linear-gradient(165deg,#f4efe2,#dfe7ee)}
.qcard::before{content:"";position:absolute;inset:8px;border:1.5px solid rgba(122,80,20,.28);border-radius:13px;pointer-events:none}
body.greek .qcard::before{border-color:rgba(40,80,120,.28)}
.qcard .kick{font-family:'Optima',Palatino,serif;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#9c5a18}
body.greek .qcard .kick{color:#2c5a86}
.qcard .word{font-family:'Optima',Palatino,serif;font-weight:800;font-size:42px;color:var(--acc);margin:8px 0 4px;line-height:1.05}
.qcard .pos{font-style:italic;font-size:14px;color:#7a5a2a}
body.greek .qcard .word{color:#143a5e}
.choices{display:grid;gap:11px}
.choice{text-align:left;background:linear-gradient(170deg,var(--stone3),var(--stone2));border:1.5px solid var(--stone4);
  border-radius:14px;padding:16px 17px;font-size:18px;color:var(--cream);transition:transform .1s,border-color .12s,background .12s;
  display:flex;align-items:center;gap:13px}
.choice .n{width:28px;height:28px;flex:0 0 auto;border-radius:8px;background:rgba(var(--glowA),.16);color:var(--hi-bright);
  font-family:'Optima',serif;font-size:15px;display:flex;align-items:center;justify-content:center}
.choice:active{transform:scale(.98)} .choice:hover{border-color:var(--hi-dim)}
.choice.correct{border-color:var(--green-bright);background:linear-gradient(170deg,rgba(63,125,58,.4),rgba(40,80,36,.4))}
.choice.wrong{border-color:#c8392a;background:linear-gradient(170deg,rgba(168,38,26,.34),rgba(90,18,12,.34))}
.choice.dim{opacity:.4}
.frozen{border-radius:14px;padding:18px;text-align:center;background:rgba(63,124,196,.16);border:1px solid var(--teamB);color:var(--cream);font-size:17px}

/* mini status above question */
.ministat{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ministat .seg{flex:1;height:14px;border-radius:8px;background:rgba(0,0,0,.4);overflow:hidden;border:1px solid var(--stone4);position:relative}
.ministat .seg i{position:absolute;top:0;bottom:0;transition:left .4s,width .4s}

/* ===== TOUWTREKKEN host view ===== */
.arena{border-radius:18px;padding:20px;margin-bottom:14px;background:linear-gradient(170deg,var(--stone3),var(--stone2));border:1px solid var(--stone4);position:relative;overflow:hidden}
.teamscores{display:flex;justify-content:space-between;margin-bottom:14px}
.teamscores .ts{flex:1;text-align:center}
.teamscores .ts.r{text-align:left} .teamscores .ts.b{text-align:right}
.teamscores .nm{font-family:'Optima',serif;font-size:18px;font-weight:700}
.teamscores .sc{font-size:13px;color:var(--muted)}
.ropelane{position:relative;height:120px;margin:8px 0;border-radius:14px;background:
  linear-gradient(90deg,rgba(176,58,46,.18),transparent 40%,transparent 60%,rgba(46,111,176,.18)),rgba(0,0,0,.25);
  border:1px solid var(--stone4);overflow:hidden}
.ropelane .center{position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(255,255,255,.25);transform:translateX(-1px)}
.ropelane .goal{position:absolute;top:0;bottom:0;width:3px;background:var(--hi)}
.ropelane .goal.l{left:6%} .ropelane .goal.r{right:6%}
.ropelane .rope{position:absolute;top:50%;left:0;right:0;height:6px;transform:translateY(-50%);
  background:repeating-linear-gradient(90deg,#b8915a 0 14px,#8a6a3c 14px 20px)}
.ropelane .knot{position:absolute;top:50%;width:34px;height:34px;border-radius:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle at 35% 30%,#fff,var(--hi));box-shadow:0 0 0 3px var(--acc),0 4px 14px var(--shadow);
  transition:left .45s cubic-bezier(.2,.8,.2,1);z-index:3}
.pullers{display:flex;justify-content:space-between;margin-top:12px;gap:10px}
.pullcol{flex:1} .pullcol.b{text-align:right}
.pullrow{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--cream);margin:3px 0}
.pullcol.b .pullrow{flex-direction:row-reverse}
.pullrow .av{width:24px;height:24px;border-radius:50%;flex:0 0 auto}

/* ===== MARATHON host view ===== */
.track{border-radius:16px;padding:14px 12px;background:linear-gradient(170deg,var(--stone3),var(--stone2));border:1px solid var(--stone4);position:relative;overflow:hidden;margin-bottom:14px}
.lane{position:relative;height:46px;margin:7px 0;border-radius:10px;background:rgba(0,0,0,.22);border:1px solid var(--stone4);overflow:hidden}
.lane .finish{position:absolute;right:0;top:0;bottom:0;width:14px;background:repeating-linear-gradient(45deg,var(--hi) 0 6px,#2a1d05 6px 12px);opacity:.85}
.lane .runner{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:6px;transition:left .45s cubic-bezier(.2,.8,.2,1);white-space:nowrap;z-index:2}
.lane .runner .av{width:30px;height:30px;border-radius:50%;flex:0 0 auto;box-shadow:0 2px 8px var(--shadow)}
.lane .runner .nm{font-size:13px;color:var(--cream);text-shadow:0 1px 2px #000}
.lane.done{background:linear-gradient(90deg,rgba(63,125,58,.28),rgba(0,0,0,.22))}

/* toast & overlay */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(90px);z-index:60;
  background:linear-gradient(180deg,var(--stone3),var(--stone2));border:1px solid var(--hi-dim);border-radius:15px;
  padding:13px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 30px var(--shadow);opacity:0;
  transition:transform .4s cubic-bezier(.2,.9,.2,1),opacity .4s;max-width:92vw}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast .m{width:34px;height:34px;flex:0 0 auto}
.toast .tt{font-family:'Optima',serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--hi)}
.toast .tn{font-family:'Optima',serif;font-weight:700;font-size:16px;color:var(--cream)}
.overlay{position:fixed;inset:0;z-index:70;background:rgba(8,5,2,.84);display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}
.modal{background:linear-gradient(170deg,var(--stone3),var(--stone));border:1px solid var(--hi-dim);border-radius:22px;
  padding:30px 26px;text-align:center;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.modal .big{width:120px;height:120px;margin:0 auto 12px}
.modal h2{font-size:27px;color:var(--hi-bright);margin-bottom:4px}
.modal .sub{font-size:15px;color:var(--muted);font-style:italic;margin-bottom:14px}
.podium{text-align:left;margin:14px 0}
.podline{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;background:rgba(0,0,0,.22);margin-bottom:7px}
.podline .rk{font-family:'Optima',serif;font-weight:800;font-size:18px;color:var(--hi-bright);width:30px;text-align:center}
.podline .av{width:32px;height:32px;border-radius:50%;flex:0 0 auto}
.podline .nm{flex:1;font-size:16px}
.podline .sc{font-size:13px;color:var(--muted)}

/* collection grid */
.collgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
.coll{border-radius:14px;padding:13px 8px;text-align:center;background:linear-gradient(170deg,var(--stone3),var(--stone2));border:1px solid var(--stone4)}
.coll.locked{opacity:.45;filter:grayscale(.7)}
.coll.on{border-color:var(--hi-bright);box-shadow:0 0 0 1px rgba(var(--glowA),.3)}
.coll .av{width:54px;height:54px;margin:0 auto 6px}
.coll .nm{font-size:12px;color:var(--cream)}
.coll .pr{font-size:11px;color:var(--hi-bright);margin-top:2px}

.ach{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:13px;background:linear-gradient(170deg,var(--stone3),var(--stone2));border:1px solid var(--stone4);margin-bottom:9px}
.ach.locked{opacity:.5;filter:grayscale(.7)}
.ach .m{width:46px;height:46px;flex:0 0 auto}
.ach .nm{font-family:'Optima',serif;font-size:15px;color:var(--hi-bright)}
.ach .ds{font-size:13px;color:var(--muted)}

.foot{margin-top:auto;padding-top:22px;text-align:center;color:var(--muted2);font-size:12px;letter-spacing:.05em}
.fb-warn{font-size:12px;color:var(--muted2);text-align:center;margin-top:8px}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.screen{animation:fade .3s ease}
</style>
<style>.portal-back{position:fixed;top:10px;left:10px;z-index:9999;display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,.4);border:1px solid rgba(212,175,55,.35);color:#d4af37;text-decoration:none;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}.portal-back:hover{background:rgba(0,0,0,.65);border-color:rgba(212,175,55,.7);}.portal-back svg{width:22px;height:22px;display:block;}.portal-back+header{padding-left:54px;}</style>

function norm(s){ return String(s||"").toLowerCase().trim().replace(/[.,;:!?'"()]/g,"").replace(/\s+/g," "); }
function code4(){ const A="ABCDEFGHJKLMNPQRSTUVWXYZ"; let s=""; for(let i=0;i<4;i++)s+=A[rand(A.length)]; return s; }
function uid(){ return "p"+Math.random().toString(36).slice(2,9); }

/* ---------- vocab: filtering & categories ---------- */
const CATS = [
  {id:"all",  nm:"Alle woorden", tags:null},
  {id:"verb", nm:"Werkwoorden",  tags:["verb"]},
  {id:"subst",nm:"Zelfst. nw.",  tags:["subst"]},
  {id:"adj",  nm:"Bijv. nw.",    tags:["adj"]},
  {id:"adv",  nm:"Bijwoorden",   tags:["adv"]},
  {id:"pron", nm:"Voornaamw.",   tags:["pron"]},
  {id:"prep", nm:"Voorzetsels",  tags:["prep"]},
  {id:"conj", nm:"Voegwoorden",  tags:["cj","vw"]},
];
function posMatch(w, catId){
  const c = CATS.find(x=>x.id===catId);
  if(!c || !c.tags) return true;
  const pos = String(w.pos||"").toLowerCase();
  return c.tags.some(t=>pos.includes(t));
}
// Some frequency entries are stem-form stubs ("pf. sum: zijn") — skip those as quiz words.
function usable(w){
  if(!w.la || !w.nl) return false;
  if(/^(pf|ppp|inf|imp)\./i.test(w.nl.trim())) return false;
  return true;
}
function catCount(list, catId){ return list.filter(w=>usable(w)&&posMatch(w,catId)).length; }
function baseList(lang){ return lang==="el" ? VOCAB_EL : VOCAB_LA; }

function buildPool(draft){
  if(draft.source==="custom"){
    return parseCustom(draft.customText);
  }
  let list = baseList(draft.lang).filter(usable);
  const lo = Math.min(draft.fromN, draft.toN), hi = Math.max(draft.fromN, draft.toN);
  list = list.filter(w => (w.f||0) >= lo && (w.f||0) <= hi);
  if(draft.cat && draft.cat!=="all") list = list.filter(w=>posMatch(w, draft.cat));
  // keep only what we need for the quiz
  return list.map(w=>({la:w.la, nl:w.nl, pos:w.pos||""}));
}
function parseCustom(text){
  const out=[];
  (text||"").split(/\r?\n/).forEach(line=>{
    line=line.trim(); if(!line) return;
    const m = line.split(/\s*(?:=|:|—|–|\t|;)\s*/);
    if(m.length>=2){ const la=m[0].trim(); const nl=m.slice(1).join(" / ").trim(); if(la&&nl) out.push({la,nl,pos:""}); }
  });
  return out;
}
function ansText(w){ return cleanNL(w.nl); }
function cleanNL(nl){ return String(nl||"").split(/\s*\|\s*|\s*;\s*/)[0].replace(/^\d+\.\s*/,"").trim(); }

function makeQuestion(pool){
  const w = pick(pool);
  const correct = ansText(w);
  const opts=[correct];
  for(const x of shuffle(pool)){
    const a = ansText(x);
    if(!opts.some(o=>norm(o)===norm(a))){ opts.push(a); if(opts.length>=4) break; }
  }
  while(opts.length<2) opts.push("…");
  const shuffled = shuffle(opts);
  return { la:w.la, pos:w.pos, options:shuffled, correctIdx: shuffled.findIndex(o=>norm(o)===norm(correct)) };
}

/* ---------- sound (lichte WebAudio beeps, geen extra library) ---------- */
let AC=null;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function beep(kind){
  const a=ac(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain(); o.connect(g); g.connect(a.destination);
  const t=a.currentTime; let f=440;
  if(kind==="good"){ f=660; } else if(kind==="bad"){ f=200; } else if(kind==="win"){ f=520; } else if(kind==="ach"){ f=760; }
  o.frequency.setValueAtTime(f,t); o.type = kind==="bad"?"sawtooth":"triangle";
  g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.16,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.22);
  o.start(t); o.stop(t+.24);
  if(kind==="good"||kind==="win"||kind==="ach"){ const o2=a.createOscillator(),g2=a.createGain(); o2.connect(g2);g2.connect(a.destination);
    o2.frequency.setValueAtTime(f*1.5,t+.1);o2.type="triangle";g2.gain.setValueAtTime(.0001,t+.1);g2.gain.exponentialRampToValueAtTime(.12,t+.12);g2.gain.exponentialRampToValueAtTime(.0001,t+.3);o2.start(t+.1);o2.stop(t+.32); }
}

/* ---- Firebase net ---- */
const FBNet = {
  mode:"firebase",
  roomRef(code){ return fbDB.ref("rooms/"+code); },
  createRoom(code, data){ return this.roomRef(code).set(data); },
  exists(code){ return this.roomRef(code+"/meta").once("value").then(s=>s.exists()); },
  getMeta(code){ return this.roomRef(code+"/meta").once("value").then(s=>s.val()); },
  getPool(code){ return this.roomRef(code+"/pool").once("value").then(s=>s.val()||[]); },
  onState(code, cb){ const r=this.roomRef(code+"/state"); const f=r.on("value",s=>cb(s.val()||{})); return ()=>r.off("value",f); },
  onPlayers(code, cb){ const r=this.roomRef(code+"/players"); const f=r.on("value",s=>cb(s.val()||{})); return ()=>r.off("value",f); },
  setState(code, patch){ return this.roomRef(code+"/state").update(patch); },
  addPlayer(code, player){ const r=this.roomRef(code+"/players").push(); r.onDisconnect().update({online:false}); r.set(player); return r.key; },
  updatePlayer(code, pid, patch){ return this.roomRef(code+"/players/"+pid).update(patch); },
  ropePull(code, delta, lo, hi){ return this.roomRef(code+"/state/ropePos").transaction(v=>clamp((v||0)+delta, lo, hi)); },
  serverTime(){ return firebase.database.ServerValue.TIMESTAMP; },
};

/* ---- Demo net (in-memory, één tab; host speelt tegen bots) ---- */
const DemoNet = (function(){
  const rooms={};
  function emit(code){ const r=rooms[code]; if(!r)return; r.stateCbs.forEach(cb=>cb(Object.assign({},r.state))); r.playerCbs.forEach(cb=>cb(JSON.parse(JSON.stringify(r.players)))); }
  return {
    mode:"demo",
    createRoom(code,data){ rooms[code]={meta:data.meta, pool:data.pool, state:data.state||{}, players:data.players||{}, stateCbs:[], playerCbs:[]}; return Promise.resolve(); },
    exists(code){ return Promise.resolve(!!rooms[code]); },
    getMeta(code){ return Promise.resolve(rooms[code]?rooms[code].meta:null); },
    getPool(code){ return Promise.resolve(rooms[code]?rooms[code].pool:[]); },
    onState(code,cb){ const r=rooms[code]; if(!r)return ()=>{}; r.stateCbs.push(cb); cb(Object.assign({},r.state)); return ()=>{ r.stateCbs=r.stateCbs.filter(x=>x!==cb); }; },
    onPlayers(code,cb){ const r=rooms[code]; if(!r)return ()=>{}; r.playerCbs.push(cb); cb(JSON.parse(JSON.stringify(r.players))); return ()=>{ r.playerCbs=r.playerCbs.filter(x=>x!==cb); }; },
    setState(code,patch){ const r=rooms[code]; if(!r)return Promise.resolve(); Object.assign(r.state,patch); emit(code); return Promise.resolve(); },
    addPlayer(code,player){ const r=rooms[code]; if(!r)return null; const id=uid(); r.players[id]=player; emit(code); return id; },
    updatePlayer(code,pid,patch){ const r=rooms[code]; if(!r||!r.players[pid])return Promise.resolve(); Object.assign(r.players[pid],patch); emit(code); return Promise.resolve(); },
    ropePull(code,delta,lo,hi){ const r=rooms[code]; if(!r)return Promise.resolve(); r.state.ropePos=clamp((r.state.ropePos||0)+delta,lo,hi); emit(code); return Promise.resolve(); },
    serverTime(){ return nowMs(); },
  };
})();

function setCat(id){ DRAFT.cat=id; SCREENS.hostSource(); }
function handleFile(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const msg=el("customMsg"); if(msg)msg.textContent="Bestand lezen…";
  const name=(file.name||"").toLowerCase();
  const reader=new FileReader();
  reader.onerror=()=>{ if(msg)msg.textContent="Kon het bestand niet lezen."; };
  if(name.endsWith(".xlsx")||name.endsWith(".xls")){
    // SheetJS alleen laden als het nodig is
    loadSheetJS().then(XLSX=>{
      reader.onload=e=>{ try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""});
        ingestRows(rows);
      }catch(err){ if(msg)msg.textContent="Kon het Excel-bestand niet lezen."; } };
      reader.readAsArrayBuffer(file);
    }).catch(()=>{ if(msg)msg.textContent="Excel vereist internet. Plak de woorden anders als tekst."; });
  } else {
    reader.onload=e=>{ try{
      const text=e.target.result, sep=text.indexOf("\t")>=0?"\t":(text.indexOf(";")>=0?";":",");
      ingestRows(text.split(/\r?\n/).map(l=>l.split(sep)));
    }catch(err){ if(msg)msg.textContent="Kon het bestand niet lezen."; } };
    reader.readAsText(file);
  }
}
function loadSheetJS(){
  return new Promise((res,rej)=>{
    if(window.XLSX) return res(window.XLSX);
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=()=>res(window.XLSX); s.onerror=rej; document.head.appendChild(s);
  });
}
function ingestRows(rows){
  const msg=el("customMsg");
  if(!rows||!rows.length){ if(msg)msg.textContent="Leeg bestand."; return; }
  let la=0,nl=1,start=0;
  const head=rows[0].map(c=>String(c||"").toLowerCase());
  const fi=head.findIndex(h=>/lat|grie|woord/.test(h)), ni=head.findIndex(h=>/vert|betek|meaning/.test(h));
  if(fi>=0&&ni>=0){ la=fi;nl=ni;start=1; } else if(head.some(h=>/[a-zα-ω]/.test(h))){ start=1; }
  const lines=[];
  for(let r=start;r<rows.length;r++){ const row=rows[r]; if(!row)continue;
    const a=String(row[la]==null?"":row[la]).trim(), b=String(row[nl]==null?"":row[nl]).trim();
    if(a&&b)lines.push(a+" = "+b);
  }
  DRAFT.customText=lines.join("\n"); DRAFT.source="custom";
  const box=el("customBox"); if(box)box.value=DRAFT.customText;
  if(msg)msg.textContent="Ingelezen: "+lines.length+" woorden.";
}
function confirmSource(){
  if(DRAFT.source==="custom"){ const box=el("customBox"); if(box)DRAFT.customText=box.value; }

  if(DRAFT.game==="battle"){ go("battleHostSettings"); return; }
  go("hostSettings");
}

function endGameManual(){ Net.setState(CODE,{status:"finished",winner:"_stopped"}); }

function startBots(){
  if(botTimer)clearInterval(botTimer);
  botTimer=setInterval(()=>{
    if(STATE.status!=="playing")return;
    Object.keys(PLAYERS).forEach(id=>{
      const p=PLAYERS[id]; if(!p.isBot||p.finished)return;
      if(p.frozenUntil&&nowMs()<p.frozenUntil)return;
      if(Math.random()<0.45){ // niet elke tick
        const ok = Math.random() < (p.skill||0.6);
        applyAnswer(id, p, ok);
      }
    });
  }, 900);
}

/* gedeelde antwoord-afhandeling (gebruikt door bots op host én door spelers lokaal) */
function applyAnswer(pid, p, ok){
  if(META.game==="touwtrekken"){
    const dir = p.team==="A" ? -1 : 1;       // A trekt naar links (negatief), B naar rechts
    const delta = ok ? dir : -dir;
    Net.ropePull(CODE, delta, -META.target, META.target);
    Net.updatePlayer(CODE, pid, ok?{correct:(p.correct||0)+1}:{wrong:(p.wrong||0)+1});
  } else {
    if(ok){
      const np=Math.min(META.target,(p.pos||0)+1);
      const patch={ pos:np, correct:(p.correct||0)+1 };
      if(np>=META.target){ patch.finished=true; patch.finishedAt=Net.serverTime(); }
      Net.updatePlayer(CODE, pid, patch);
    } else {
      if(META.penalty==="freeze"){ Net.updatePlayer(CODE,pid,{ frozenUntil: nowMs()+META.freezeSec*1000, wrong:(p.wrong||0)+1 }); }
      else { Net.updatePlayer(CODE,pid,{ pos:Math.max(0,(p.pos||0)-1), wrong:(p.wrong||0)+1 }); }
    }
  }
}

let _ending=false;
function hostCheckEnd(){
  if(ROLE!=="host"||STATE.status!=="playing"||_ending)return;
  if(META.game==="touwtrekken"){
    const rp=STATE.ropePos||0;
    if(rp<=-META.target){ _ending=true; Net.setState(CODE,{status:"finished",winner:"A"}); }
    else if(rp>=META.target){ _ending=true; Net.setState(CODE,{status:"finished",winner:"B"}); }
  } else {
    const fin=Object.entries(PLAYERS).filter(([id,p])=>p.finished).sort((a,b)=>(a[1].finishedAt||0)-(b[1].finishedAt||0));
    if(fin.length){ _ending=true; Net.setState(CODE,{status:"finished",winner:fin[0][0]}); }
  }
}

  if(c.length!==4){ toast("Code klopt niet","Voer de 4-letter code van het bord in."); return; }
  if(!nm){ toast("Naam ontbreekt","Vul je naam in."); return; }
  P.name=nm; saveProfile();
  chooseNet();
  if(Net===DemoNet){ toast("Geen verbinding","Deze code werkt alleen met Firebase. Vraag je docent of dit is ingesteld."); return; }
  const ex=await Net.exists(c);
  if(!ex){ toast("Niet gevonden","Geen wedstrijd met code "+c+". Controleer de code."); return; }
  CODE=c; ROLE="player";
  META = await Net.getMeta(CODE);
  POOL = await Net.getPool(CODE);
  const team = await assignTeam();
  PID = Net.addPlayer(CODE, { name:nm, color:P.color, avatar:P.avatar, isBot:false, online:true,
    team, pos:0, correct:0, wrong:0, finished:false, frozenUntil:0 });
  go("playerLobby");
}
async function assignTeam(){
  if(META.game!=="touwtrekken") return "A";
  return new Promise(res=>{
    const off=Net.onPlayers(CODE, ps=>{ off();
      let a=0,b=0; Object.values(ps||{}).forEach(p=>{ if(p.team==="A")a++; else if(p.team==="B")b++; });
      res(a<=b?"A":"B");
    });
  });
}

function drawQuestion(){
  const me=myPlayer();
  if(me.frozenUntil && nowMs()<me.frozenUntil){ return drawFrozen(me.frozenUntil); }
  answered=false;
  curQ = makeQuestion(POOL);
  H(brand(false)+`<div id="mini">${miniHTML()}</div>

function drawFrozen(until){
  H(brand(false)+`<div id="mini">${miniHTML()}</div>
    <div class="frozen"><div style="font-size:40px;margin-bottom:6px">${iconSVG("torch",40,"var(--teamB)")}</div>

  if(freezeTimer)clearInterval(freezeTimer);
  freezeTimer=setInterval(()=>{
    const left=Math.ceil((until-nowMs())/1000);
    const n=el("freezeN"); if(n)n.textContent=Math.max(0,left);
    if(left<=0){ clearInterval(freezeTimer); freezeTimer=null; if(STATE.status==="playing")drawQuestion(); }

function answer(i){
  if(answered)return; answered=true;
  const ok = i===curQ.correctIdx;
  const me=myPlayer();
  // visuele feedback
  document.querySelectorAll("#choices .choice").forEach((b,k)=>{
    if(k===curQ.correctIdx)b.classList.add("correct");
    else if(k===i)b.classList.add("wrong"); else b.classList.add("dim");
    b.onclick=null;
  });

  P.played = P.played; // no-op
  if(ok){ myStreak++; P.correct++; if(myStreak>P.bestStreak)P.bestStreak=myStreak; addCoins(2); beep("good"); }
  else { myStreak=0; beep("bad"); }
  saveProfile();
  applyAnswer(PID, me, ok);
  setTimeout(()=>{ if(STATE.status==="playing")drawQuestion(); }, ok?520:900);

/* ---- ABILITY HELPERS ---- */
function bmGetAbilityCost(cls,abl){
  let c=abl.cost;
  if(cls?.passive?.type==="cost_reduce"&&abl.tier==="basic") c=Math.max(1,c-cls.passive.val);
  return c;
}
function bmCalcAbilityEffect(p,cls,abl){
  const fx={dmg:0,heal:0,shld:0,teamBE:0,selfBE:0,shldRemove:0,bypass:false};
  const t=abl.type, pasv=cls?.passive, mt=p.team;
  const isDmg=["attack","attack_bypass","attack_weakspot","attack_and_defend","attack_and_shld_remove","attack_siege","heal_and_attack"].includes(t);
  if(isDmg){
    let d=abl.dmg||0;
    if(pasv?.type==="atk_flat")  d+=pasv.val;
    if(pasv?.type==="atk_bonus") d=Math.round(d*(1+pasv.val));
    if(t==="attack_weakspot"){
      const et=mt==="A"?"B":"A";const eh=BM_TEAMS[et]||{health:100,maxHealth:100};
      if(eh.maxHealth>0&&eh.health/eh.maxHealth<=0.30) d+=(abl.bonusDmg||0);
    }
    fx.dmg=d; fx.bypass=(t==="attack_bypass");
    if(pasv?.type==="shld_pierce") fx.shldRemove+=pasv.val; // genie passief
  }
  if(["team_shield","testudo","attack_and_defend"].includes(t)) fx.shld=abl.shld||0;
  if(["team_shield","testudo"].includes(t)&&pasv?.type==="be_on_defend") fx.selfBE+=pasv.val;
  if(["heal","heal_and_attack"].includes(t)){ let h=abl.heal||0; if(pasv?.type==="heal_flat") h+=pasv.val; fx.heal=h; }
  if(["team_be","testudo"].includes(t)) fx.teamBE=abl.teamBE||0;
  if(["shield_remove","attack_and_shld_remove","attack_siege"].includes(t)) fx.shldRemove+=(abl.shldRemove||0);
  return fx;
}
function bmCalcSynergy(players,team){
  const unique=new Set(Object.values(players).filter(p=>p.team===team&&p.class).map(p=>p.class)).size;
  let bonus=0;
  for(const tier of BM_SYNERGY){if(unique>=tier.minClasses)bonus=tier.beBonus;}
  return bonus;
}

async function bmDistributeQs(roundN){
  const pids=Object.keys(BM_PLAYERS);if(!pids.length)return;
  const at=BM_META?.answerTimer||10;
  // Synergiebonus (flat BE per speler) + passief BE voor Centurio
  const synA=bmCalcSynergy(BM_PLAYERS,"A"),synB=bmCalcSynergy(BM_PLAYERS,"B");
  const up={};
  for(const pid of pids){
    const p=BM_PLAYERS[pid]||{};
    const cls=BM_CLASSES.find(c=>c.id===p.class);
    let beBonus=p.team==="A"?synA:synB;
    if(cls?.passive?.type==="be_passive") beBonus+=cls.passive.val;
    const pool=bmPersonalPool(pid,POOL);
    up["players/"+pid+"/currentQ"]=JSON.stringify(makeQuestion(pool));
    up["players/"+pid+"/answeredRound"]=-1;
    up["players/"+pid+"/lockedAction"]=null;
    if(beBonus>0) up["players/"+pid+"/be"]=(p.be||0)+beBonus;
  }
  // Team-klassenlijst schrijven zodat spelers combo's kunnen zien
  const clsA=[...new Set(Object.values(BM_PLAYERS).filter(p=>p.team==="A"&&p.class).map(p=>p.class))];
  const clsB=[...new Set(Object.values(BM_PLAYERS).filter(p=>p.team==="B"&&p.class).map(p=>p.class))];
  // Schrijf state-velden apart zodat resolvedRound niet wordt overschreven
  up["state/status"]="playing";
  up["state/round"]={n:roundN,phase:"question",deadline:Date.now()+at*1000};
  up["state/winner"]=null;
  up["teams/A/classes"]=clsA;
  up["teams/B/classes"]=clsB;
  await fbDB.ref("rooms/"+BM_CODE).update(up);
}
function bmPersonalPool(pid,pool){
  if(!BM_META?.adaptive)return pool;
  const missed=BM_MISSED[pid]||{};
  const w=[...pool];
  pool.forEach(word=>{const c=missed[word.la]||0;for(let i=0;i<Math.min(c,3);i++)w.push(word);});
  return w.length?w:pool;
}

async function bmTick(){

/* ---- RESOLUTIE (host-autoritair, data-gedreven) ---- */
async function bmResolve(roundN){
  BM_RESOLVING=true;
  try{
    const guardSnap=await fbDB.ref("rooms/"+BM_CODE+"/state/resolvedRound").once("value");
    if(guardSnap.val()===roundN)return;
    await fbDB.ref("rooms/"+BM_CODE+"/state/resolvedRound").set(roundN);

    const players=BM_PLAYERS;
    // Effecten komend VAN elk team (richting het andere)
    const from={A:{dmg:0,bypassDmg:0,shldRemove:0},B:{dmg:0,bypassDmg:0,shldRemove:0}};
    // Effecten TEN VOORDELE van elk team
    const for_={A:{heal:0,shld:0,teamBE:0},B:{heal:0,shld:0,teamBE:0}};
    const events=[];
    const pUpd={}; // pid → {be, damage, healing, lockedAction:null}

    // Pas 1: individuele abilities
    for(const[pid,p]of Object.entries(players)){
      const action=p.lockedAction;
      if(!action||action.type==="combo")continue;
      const cls=BM_CLASSES.find(c=>c.id===p.class);
      const abl=cls?.abilities.find(a=>a.id===action.abilityId);
      if(!abl)continue;
      const mt=p.team,et=mt==="A"?"B":"A";
      const fx=bmCalcAbilityEffect(p,cls,abl);
      if(fx.bypass)  from[mt].bypassDmg+=fx.dmg;
      else           from[mt].dmg+=fx.dmg;
      from[mt].shldRemove+=fx.shldRemove;
      for_[mt].shld+=fx.shld;
      for_[mt].heal+=fx.heal;
      for_[mt].teamBE+=fx.teamBE;
      pUpd[pid]={be:Math.max(0,(p.be||0)-(action.cost||0)+(fx.selfBE||0)),
                 damage:(p.damage||0)+fx.dmg, healing:(p.healing||0)+fx.heal, lockedAction:null};
      events.push({pid,abilityId:abl.id,team:mt,dmg:fx.dmg,heal:fx.heal,shld:fx.shld});
    }

    // Pas 2: combo's — zoek overeenkomende paren binnen hetzelfde team
    const comboPids=Object.entries(players).filter(([,p])=>p.lockedAction?.type==="combo");
    for(const combo of BM_COMBOS){
      const[c0,c1]=combo.classes;
      const pa=comboPids.find(([,p])=>p.class===c0&&p.lockedAction?.comboId===combo.id);
      const pb=comboPids.find(([,p])=>p.class===c1&&p.lockedAction?.comboId===combo.id&&p.team===(pa?.[1]?.team));
      if(!pa||!pb)continue;
      const mt=pa[1].team;
      if(combo.dmg)   from[mt].dmg+=(combo.dmg||0);
      if(combo.shld)  for_[mt].shld+=(combo.shld||0);
      if(combo.heal)  for_[mt].heal+=(combo.heal||0);
      if(combo.teamBE)for_[mt].teamBE+=(combo.teamBE||0);
      if(combo.shldRemove)from[mt].shldRemove+=(combo.shldRemove||0);
      for(const[pid]of[pa,pb]){
        const p=players[pid];
        const prev=pUpd[pid]||{be:p.be||0,damage:p.damage||0,healing:p.healing||0};
        pUpd[pid]={...prev,be:Math.max(0,prev.be-(combo.cost||4)),lockedAction:null};
      }
      events.push({type:"combo",comboId:combo.id,team:mt});
    }

    // Pas 3: teamBE verdelen over alle teamgenoten
    for(const[pid,p]of Object.entries(players)){
      const bonus=for_[p.team]?.teamBE||0;
      if(!bonus)continue;
      const prev=pUpd[pid]||{be:p.be||0,damage:p.damage||0,healing:p.healing||0,lockedAction:null};
      pUpd[pid]={...prev,be:(prev.be)+bonus};
    }

    // Schrijf spelerupdates
    for(const[pid,upd]of Object.entries(pUpd)){
      await fbDB.ref("rooms/"+BM_CODE+"/players/"+pid).update(upd);
    }

    // Berekening effectieve schade (schild absorbeert, bypass negeert schild)
    const shldA=Math.max(0,for_.A.shld-from.B.shldRemove);
    const shldB=Math.max(0,for_.B.shld-from.A.shldRemove);
    const efA=Math.max(0,from.B.dmg-shldA)+from.B.bypassDmg;
    const efB=Math.max(0,from.A.dmg-shldB)+from.A.bypassDmg;
    const tA=BM_TEAMS.A||{health:100,maxHealth:100},tB=BM_TEAMS.B||{health:100,maxHealth:100};
    const newHA=Math.max(0,Math.min(tA.maxHealth,tA.health-efA+for_.A.heal));
    const newHB=Math.max(0,Math.min(tB.maxHealth,tB.health-efB+for_.B.heal));
    await fbDB.ref("rooms/"+BM_CODE+"/teams").update({"A/health":newHA,"B/health":newHB});
    fbDB.ref("rooms/"+BM_CODE+"/log").push({round:roundN,events,efA,efB,newHA,newHB});

    // Mastery bijhouden in identities (fire-and-forget)
    bmUpdateMastery(players,pUpd,events);

    if(newHA<=0||newHB<=0){
      await fbDB.ref("rooms/"+BM_CODE+"/state").update({status:"finished",winner:newHA<=0?"B":"A"});
      return;
    }
    await bmDistributeQs(roundN+1);
    bmHostStartTimer();
  }finally{BM_RESOLVING=false;}
}

function bmUpdateMastery(players,pUpd,events){
  if(!fbDB)return;
  for(const[pid,p]of Object.entries(players)){
    const cls=p.class;if(!cls||!p.identityKey)continue;
    const[klas,lcode]=(p.identityKey||"").split(":");if(!klas||!lcode)continue;
    const evs=events.filter(e=>e.pid===pid);
    const contrib={
      rounds:firebase.database.ServerValue.increment(1),
      damage:firebase.database.ServerValue.increment(evs.reduce((s,e)=>s+(e.dmg||0),0)),
      healing:firebase.database.ServerValue.increment(evs.reduce((s,e)=>s+(e.heal||0),0)),
    };
    fbDB.ref("identities/"+klas+"/"+lcode+"/classHistory/"+cls).update(contrib).catch(()=>{});
  }
}
function bmEndGame(){
  if(fbDB)fbDB.ref("rooms/"+BM_CODE+"/state").update({status:"finished",winner:"_stopped"});
  cleanup();bmLeave();go("home");
}
function bmHostResult(){
  cleanup();
  const w=BM_STATE.winner;
  const all=Object.values(BM_PLAYERS);
  const topDmg=all.length?all.reduce((a,b)=>(a.damage||0)>=(b.damage||0)?a:b):null;
  const topAcc=all.filter(p=>(p.correct||0)+(p.wrong||0)>0).sort((a,b)=>
    ((b.correct||0)/((b.correct||0)+(b.wrong||0)))-((a.correct||0)/((a.correct||0)+(a.wrong||0))))[0]||null;
  const ov=el("overlay"); if(!ov)return;
  ov.innerHTML=`<div class="modal">
    <div class="big">${medalSVG("laurel",120)}</div>
    <h2>${w==="A"?"🔴 Rood wint!":w==="B"?"🔵 Blauw wint!":"Gevecht gestopt"}</h2>
    <div style="margin:14px 0">
      ${topDmg?`<div class="podline"><span class="av">${avatarHTML(topDmg.avatar||"helmet",topDmg.color||COLORS[0],32)}</span><span class="nm">⚔️ Meeste schade</span><span class="sc">${esc(topDmg.name)} — ${topDmg.damage||0}</span></div>`:""}
      ${topAcc?`<div class="podline"><span class="av">${avatarHTML(topAcc.avatar||"helmet",topAcc.color||COLORS[0],32)}</span><span class="nm">📚 Scholar</span><span class="sc">${esc(topAcc.name)} — ${topAcc.correct||0}/${(topAcc.correct||0)+(topAcc.wrong||0)}</span></div>`:""}
    </div>
    <button class="btn btn-gold btn-block" onclick="closeOverlay();bmLeave();go('home')">Terug</button>
  </div>`;
  ov.classList.add("show");beep("win");
}

/* ---- SCHERM: battleJoin ---- */
SCREENS.battleJoin = function(){
  if(!BM_IDENT){go("battleIdentity");return;}
  const savedSess=(()=>{try{const s=sessionStorage.getItem("bm_session");return s?JSON.parse(s):null;}catch(e){return null;}})();
  H(brand(true)+`
  <div class="scrhead"><button class="back" onclick="go('battleHome')">${iconSVG("shield",20,"currentColor")}</button><h2>Meedoen</h2></div>
  ${savedSess?`<div class="panel"><div class="note">Je was al actief in gevecht <b>${esc(savedSess.code)}</b>.</div>
    <button class="btn btn-gold btn-block" style="margin-top:8px" onclick="bmRejoin()">Heraansluiten</button>
    <button class="btn btn-ghost btn-block" style="margin-top:6px" onclick="sessionStorage.removeItem('bm_session');SCREENS.battleJoin()">Nieuw spel</button>
  </div>`:""}
  <div class="panel">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      ${avatarHTML(BM_IDENT.avatar||P.avatar,BM_IDENT.color||P.color,44)}
      <div><div style="font-size:20px">${esc(BM_IDENT.name)}</div>
        <div class="note">${esc(BM_IDENT.klascode)} · ${esc(BM_IDENT.leerlingcode)}</div></div>
    </div>
    <label class="fld">Spelcode van het bord</label>
    <input id="bmJC" type="text" placeholder="ABCD" style="text-transform:uppercase;font-size:26px;text-align:center;letter-spacing:.2em" maxlength="4" oninput="this.value=this.value.toUpperCase()">
    <div id="bmJE" class="note warn" style="display:none;margin-top:8px"></div>
  </div>
  <button class="btn btn-gold btn-block lg" onclick="bmDoJoin()">Doe mee</button>
  ${foot()}`);
};
async function bmDoJoin(){
  const code=(el("bmJC")?.value||"").trim().toUpperCase();
  const err=el("bmJE");
  if(code.length<3){if(err){err.textContent="Voer de spelcode in.";err.style.display="";}return;}
  if(err)err.style.display="none";
  let meta,stateSnap;
  try{
    const[ms,ss]=await Promise.all([
      fbDB.ref("rooms/"+code+"/meta").once("value"),
      fbDB.ref("rooms/"+code+"/state").once("value")
    ]);
    meta=ms.val();stateSnap=ss.val();
  }catch(e){if(err){err.textContent="Kan kamer niet vinden — controleer je internetverbinding.";err.style.display="";}return;}
  if(!meta||meta.game!=="battle"){if(err){err.textContent="Geen Battle Mode spel met code "+code+".";err.style.display="";}return;}
  if(stateSnap?.status==="finished"){if(err){err.textContent="Dit spel is al afgelopen.";err.style.display="";}return;}
  BM_CODE=CODE=code;BM_META=meta;
  const isPlaying=stateSnap?.status==="playing";
  let team=null;
  if(isPlaying){
    // late join: wijs toe aan kleinste team
    const ps=await fbDB.ref("rooms/"+code+"/players").once("value");
    const all=Object.values(ps.val()||{});
    const cA=all.filter(p=>p.team==="A").length,cB=all.filter(p=>p.team==="B").length;
    team=cA<=cB?"A":"B";
  }
  const pd={name:BM_IDENT.name,color:BM_IDENT.color||P.color,avatar:BM_IDENT.avatar||P.avatar,
    team,class:null,be:0,correct:0,wrong:0,damage:0,healing:0,
    answeredRound:isPlaying?(stateSnap.round?.n||0):- 1, // sla huidige ronde over bij late join
    lockedAction:null,online:true,
    identityKey:BM_IDENT.klascode+":"+BM_IDENT.leerlingcode};
  const ref=fbDB.ref("rooms/"+code+"/players").push();
  ref.onDisconnect().update({online:false});
  await ref.set(pd);BM_PID=ref.key;
  try{sessionStorage.setItem("bm_session",JSON.stringify({pid:BM_PID,code:BM_CODE}));}catch(e){}
  go(isPlaying?"battlePlayerGame":"battlePlayerLobby");
}

async function bmRejoin(){
  try{
    const s=sessionStorage.getItem("bm_session");if(!s)return false;
    const{pid,code}=JSON.parse(s);
    const[ps,ms,ss]=await Promise.all([
      fbDB.ref("rooms/"+code+"/players/"+pid).once("value"),
      fbDB.ref("rooms/"+code+"/meta").once("value"),
      fbDB.ref("rooms/"+code+"/state").once("value")
    ]);
    const p=ps.val(),meta=ms.val(),st=ss.val();
    if(!p||!meta||meta.game!=="battle"||st?.status==="finished")return false;
    BM_CODE=CODE=code;BM_PID=pid;BM_META=meta;
    BM_IDENT=bmIdentLoad()||BM_IDENT;BM_MY_BE=p.be||0;
    const ref=fbDB.ref("rooms/"+code+"/players/"+pid);
    ref.onDisconnect().update({online:false});
    await ref.update({online:true});
    go(st?.status==="playing"?"battlePlayerGame":"battlePlayerLobby");
    return true;
  }catch(e){return false;}
}

  <div class="scrhead"><button class="back" onclick="cleanup();bmLeave();go('battleHome')">${iconSVG("shield",20,"currentColor")}</button><h2>Battle Lobby</h2></div>
  <div class="panel" style="text-align:center">
    ${avatarHTML(BM_IDENT?.avatar||P.avatar,BM_IDENT?.color||P.color,48)}
    <div style="font-size:18px;margin-top:6px">${esc(BM_IDENT?.name||"")}</div>
    <div class="note">Spelcode: ${BM_CODE}</div>
  </div>
  <div class="panel">
    <div class="eyebrow l">Kies je klasse</div>
    ${BM_CLASSES.map(c=>{
      const sel=myClass===c.id;
      return `<button class="tile" style="margin-bottom:8px;padding:12px 14px${sel?";border:2px solid "+c.color:""}" onclick="bmPickClass('${c.id}')">
        <div style="display:flex;align-items:flex-start;gap:12px">
          ${iconSVG(c.icon,30,c.color)}
          <div style="flex:1">
            <div style="font-size:15px;font-weight:700;color:${c.color}">${c.nm}</div>
            <div class="note" style="margin:2px 0">⚡ ${c.passive.desc}</div>
            <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">
              ${c.abilities.map(a=>`<span class="pill" style="font-size:10px">${a.nm}&nbsp;${bmGetAbilityCost(c,a)}BE</span>`).join("")}
            </div>
          </div>
          ${sel?`<span style="font-size:20px;align-self:center">✅</span>`:""}
        </div>
      </button>`;
    }).join("")}
  </div>
  <div class="note" style="text-align:center">Wachten tot de docent het gevecht start…</div>
  ${foot()}`);

  const rSt=fbDB.ref("rooms/"+BM_CODE+"/state/status");

  BM_UNSUBS=[()=>rSt.off("value",fSt)];
};
function bmPickClass(cid){
  BM_MY_CLASS=cid;
  fbDB.ref("rooms/"+BM_CODE+"/players/"+BM_PID).update({class:cid});
  toast("Klasse gekozen",bmClsName(cid));
  SCREENS.battlePlayerLobby(); // herrender met selectie
}

/* ---- SCHERM: battlePlayerGame ---- */
SCREENS.battlePlayerGame = function(){
  BM_ANSWERED=false;BM_ACTION_LOCKED=false;BM_MY_BE=0;BM_MY_Q=null;
  H(brand(false)+`
  <div class="scrhead"><button class="back" onclick="cleanup();bmLeave();go('battleHome')">${iconSVG("shield",20,"currentColor")}</button><h2>⚔️ Battle Mode</h2></div>
  <div id="bmPR"></div>${foot()}`);
  // scoped: aparte listeners voor round-data en game-status — geen listener op alle spelers
  const rR=fbDB.ref("rooms/"+BM_CODE+"/state/round"),
    fR=rR.on("value",s=>{BM_STATE.round=s.val()||{};bmPlayerRender();});
  const rSt=fbDB.ref("rooms/"+BM_CODE+"/state/status"),
    fSt=rSt.on("value",s=>{
      BM_STATE.status=s.val();
      if(BM_STATE.status==="finished"){
        fbDB.ref("rooms/"+BM_CODE+"/state/winner").once("value").then(ws=>{BM_STATE.winner=ws.val();cleanup();go("battleResult");});
      }
    });
  const rM=fbDB.ref("rooms/"+BM_CODE+"/players/"+BM_PID),
    fM=rM.on("value",s=>{const p=s.val();if(p){BM_MY_BE=p.be||0;BM_MY_CLASS=p.class||null;BM_MY_TEAM=p.team||null;BM_ACTION_LOCKED=!!p.lockedAction;BM_ANSWERED=p.answeredRound===(BM_STATE.round?.n);}bmPlayerRender();});
  const rT=fbDB.ref("rooms/"+BM_CODE+"/teams"),
    fT=rT.on("value",s=>{BM_TEAMS=s.val()||{};bmPlayerRender();});
  BM_UNSUBS=[()=>rR.off("value",fR),()=>rSt.off("value",fSt),()=>rM.off("value",fM),()=>rT.off("value",fT)];
};
function bmPlayerRender(){
  const root=el("bmPR"); if(!root)return;
  const round=BM_STATE.round||{};
  const tl=round.deadline?Math.max(0,Math.round((round.deadline-Date.now())/1000)):0;
  const tA=BM_TEAMS.A||{health:100,maxHealth:100},tB=BM_TEAMS.B||{health:100,maxHealth:100};
  function miniBar(nm,team,d){
    const scale=d.maxHealth?Math.max(0,d.health/d.maxHealth):0;
    const col=team==="A"?"var(--teamA)":"var(--teamB)";
    return `<div style="display:flex;align-items:center;gap:8px">
      <span style="color:${col};font-size:12px;width:36px">${nm}</span>
      <div style="flex:1;height:8px;border-radius:4px;background:rgba(0,0,0,.4);overflow:hidden">
        <div style="height:100%;width:100%;background:${col};transform:scaleX(${scale});transform-origin:left center;transition:transform .4s"></div>
      </div><span style="font-size:11px;color:var(--muted)">${d.health}</span>
    </div>`;
  }
  let content="";
  if(round.phase==="question"){
    if(BM_ANSWERED){
      content=`<div class="panel" style="text-align:center"><div style="font-size:40px">✅</div><div class="note">Wachten op andere spelers…</div></div>`;
    } else if(!BM_MY_Q||BM_MY_Q._round!==round.n){
      fbDB.ref("rooms/"+BM_CODE+"/players/"+BM_PID+"/currentQ").once("value").then(s=>{
        if(s.val()){try{BM_MY_Q={...JSON.parse(s.val()),_round:round.n};BM_ANSWERED=false;bmPlayerRender();}catch(e){}}
      });
      content=`<div class="note" style="text-align:center">Vraag laden…</div>`;
    } else {
      const lang=BM_META?.lang==="el"?"Griekse":"Latijnse";
      content=`
      <div class="qcard">
        <div class="kick">Vertaal het ${lang} woord</div>
        <div class="word">${esc(BM_MY_Q.la)}</div>
        ${BM_MY_Q.pos?`<div class="pos">${esc(BM_MY_Q.pos)}</div>`:""}
      </div>
      <div class="choices">
        ${(BM_MY_Q.options||[]).map((opt,i)=>`
          <button class="choice" id="bmC${i}" onclick="bmAnswer(${i})">
            <span class="n">${i+1}</span>${esc(opt)}
          </button>`).join("")}
      </div>`;
    }
  } else if(round.phase==="action"){
    if(BM_ACTION_LOCKED){
      content=`<div class="panel" style="text-align:center"><div style="font-size:40px">⚔️</div><div class="note">Actie vergrendeld — resolutie volgt…</div></div>`;
    } else {
      const cls=BM_CLASSES.find(c=>c.id===BM_MY_CLASS);
      if(!cls){
        content=`<div class="panel"><div class="note warn">Kies eerst een klasse in de lobby voordat je een actie kunt uitvoeren.</div></div>`;
      } else {
        const teamClasses=BM_TEAMS[BM_MY_TEAM||"A"]?.classes||[];
        const availCombos=BM_COMBOS.filter(combo=>
          combo.classes.includes(BM_MY_CLASS)&&
          combo.classes.some(c=>c!==BM_MY_CLASS&&teamClasses.includes(c))
        );
        const tierDot=t=>t==="basic"?"●":t==="advanced"?"●●":"●●●";
        content=`<div class="panel">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-weight:700;color:${cls.color}">${cls.nm}</span>
            <span style="color:var(--hi-bright)">⚡ ${BM_MY_BE} BE — ${tl}s</span>
          </div>
          ${cls.abilities.map(a=>{
            const cost=bmGetAbilityCost(cls,a);
            const ok=BM_MY_BE>=cost;
            return `<button class="tile" style="margin-bottom:6px;padding:11px 13px${ok?"":";opacity:.4;pointer-events:none"}" onclick="bmChooseAbility('${a.id}',${cost})">
              <div style="font-size:13px;font-weight:700">${a.nm} <span class="pill">${cost}&nbsp;BE</span> <span style="opacity:.6;font-size:10px">${tierDot(a.tier)}</span></div>
              <div class="note" style="margin-top:2px">${a.desc}</div>
            </button>`;
          }).join("")}
          ${availCombos.map(combo=>{
            const ok=BM_MY_BE>=combo.cost;
            const partnerNm=BM_CLASSES.find(c=>c.id===combo.classes.find(x=>x!==BM_MY_CLASS))?.nm||"";
            return `<button class="tile" style="margin-bottom:6px;padding:11px 13px;border:1px solid var(--hi)${ok?"":";opacity:.4;pointer-events:none"}" onclick="bmChooseCombo('${combo.id}',${combo.cost})">
              <div style="font-size:13px;font-weight:700">⚡ ${combo.nm} <span class="pill">${combo.cost}&nbsp;BE</span></div>
              <div class="note" style="margin-top:2px">${combo.desc}</div>
              <div class="note" style="color:var(--hi);margin-top:2px">Vraag ${esc(partnerNm)} ook Combo te kiezen!</div>
            </button>`;
          }).join("")}
          <div class="note" style="margin-top:6px">Geen keuze = BE sparen voor de volgende ronde.</div>
        </div>`;
      }
    }
  } else {
    content=`<div class="panel" style="text-align:center"><div class="note">Resolutie…</div></div>`;
  }
  root.innerHTML=`
  <div class="panel" style="margin-bottom:10px">
    ${miniBar("Rood","A",tA)}<div style="height:6px"></div>${miniBar("Blauw","B",tB)}
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span class="pill">Ronde ${round.n||"—"}</span>
    <span style="color:var(--hi-bright)">⚡ ${BM_MY_BE} BE</span>
    <span style="color:var(--muted)">${tl}s</span>
  </div>
  ${content}`;
}
function bmAnswer(idx){
  if(BM_ANSWERED||!BM_MY_Q)return;
  BM_ANSWERED=true;
  const ok=idx===BM_MY_Q.correctIdx;
  [0,1,2,3].forEach(i=>{
    const c=el("bmC"+i);if(!c)return;
    if(i===BM_MY_Q.correctIdx)c.classList.add("correct");
    else if(i===idx&&!ok)c.classList.add("wrong");
    else c.classList.add("dim");
    c.disabled=true;
  });
  beep(ok?"good":"bad");
  const round=BM_STATE.round||{};
  const at=BM_META?.answerTimer||10;
  const timeLeft=round.deadline?Math.max(0,(round.deadline-Date.now())/1000):0;
  const fast=ok&&timeLeft>at/2;
  const cls=BM_CLASSES.find(c=>c.id===BM_MY_CLASS);
  let beGain=ok?3:0;
  if(fast){ beGain+=cls?.passive?.type==="be_on_fast"?cls.passive.val:1; }
  fbDB.ref("rooms/"+BM_CODE+"/players/"+BM_PID).once("value").then(s=>{
    const p=s.val()||{};
    fbDB.ref("rooms/"+BM_CODE+"/players/"+BM_PID).update({
      answeredRound:round.n||0,
      be:(p.be||0)+beGain,
      correct:ok?(p.correct||0)+1:(p.correct||0),
      wrong:!ok?(p.wrong||0)+1:(p.wrong||0)
    });
  });
}
function bmChooseAbility(abilityId,cost){
  if(BM_ACTION_LOCKED||BM_MY_BE<cost)return;
  BM_ACTION_LOCKED=true;
  fbDB.ref("rooms/"+BM_CODE+"/players/"+BM_PID).update({lockedAction:{type:"ability",abilityId,cost}});
  const cls=BM_CLASSES.find(c=>c.id===BM_MY_CLASS);
  toast("Actie vergrendeld",cls?.abilities.find(a=>a.id===abilityId)?.nm||abilityId);
  bmPlayerRender();
}
function bmChooseCombo(comboId,cost){
  if(BM_ACTION_LOCKED||BM_MY_BE<cost)return;
  BM_ACTION_LOCKED=true;
  fbDB.ref("rooms/"+BM_CODE+"/players/"+BM_PID).update({lockedAction:{type:"combo",comboId,cost}});
  toast("Combo aangekondigd!",BM_COMBOS.find(c=>c.id===comboId)?.nm||comboId);
  bmPlayerRender();
}
