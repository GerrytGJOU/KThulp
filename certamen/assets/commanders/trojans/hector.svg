<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" fill="#1a0a04">
  <!-- Hector — Trojaanse helm met hoge kam, groot schild, speer vooruit -->
  <!-- Hoge helmpluim (paardenhaar, indrukwekkend) -->
  <path d="M144 12 Q150 4 156 12 L168 50 L158 54 L150 20 L142 54 L132 50Z"/>
  <!-- Korinthisch-Trojaanse helm -->
  <path d="M106 86 Q108 54 150 52 Q192 54 194 86 L196 118 Q190 136 184 142 L166 150 Q158 160 150 162 Q142 160 134 150 L116 142 Q110 136 104 118Z"/>
  <!-- Vizier (half open, heldhaftig) -->
  <path d="M122 90 L122 130 Q136 140 150 142 Q164 140 178 130 L178 90 Q164 82 150 80 Q136 82 122 90Z" fill="#0a0500"/>
  <ellipse cx="150" cy="108" rx="22" ry="16" fill="#1a0a04"/>
  <!-- Ogen zichtbaar -->
  <ellipse cx="140" cy="102" rx="6" ry="5" fill="#0a0500"/>
  <ellipse cx="160" cy="102" rx="6" ry="5" fill="#0a0500"/>
  <!-- Nek -->
  <rect x="138" y="160" width="24" height="16" rx="4"/>
  <!-- Bronzen wapenrusting (Trojaans) -->
  <path d="M98 156 L90 292 L210 292 L202 156 Q176 140 150 139 Q124 140 98 156Z"/>
  <!-- Schouderstukken -->
  <ellipse cx="98" cy="164" rx="26" ry="12" transform="rotate(-14 98 164)"/>
  <ellipse cx="202" cy="164" rx="26" ry="12" transform="rotate(14 202 164)"/>
  <!-- Pteryges -->
  <rect x="92"  y="287" width="14" height="42" rx="3"/>
  <rect x="110" y="287" width="14" height="46" rx="3"/>
  <rect x="128" y="287" width="14" height="48" rx="3"/>
  <rect x="146" y="287" width="14" height="48" rx="3"/>
  <rect x="164" y="287" width="14" height="46" rx="3"/>
  <rect x="182" y="287" width="14" height="42" rx="3"/>
  <rect x="200" y="287" width="14" height="38" rx="3"/>
  <!-- Linkerarm + groot rechthoekig Trojaans schild -->
  <path d="M98 162 L58 174 L50 198 L84 188Z"/>
  <rect x="24" y="165" width="38" height="70" rx="6"/>
  <!-- Rechterarm met speer naar voren -->
  <path d="M202 162 L244 154 L256 148 L216 162Z"/>
  <!-- Speer (bijna horizontaal, aanvallend) -->
  <rect x="208" y="148" width="8" height="260" rx="3" transform="rotate(-5 212 155)"/>
  <polygon points="268,138 258,146 264,170" transform="rotate(-5 212 155)"/>
  <!-- Benen -->
  <path d="M112 292 L104 442 L142 442 L150 314 L158 442 L196 442 L188 292Z"/>
  <!-- Grieken/Trojaans kniestukken -->
  <ellipse cx="120" cy="360" rx="16" ry="12"/>
  <ellipse cx="180" cy="360" rx="16" ry="12"/>
  <!-- Sandalen/laarzen -->
  <path d="M96 440 Q106 458 130 458 Q142 454 144 440Z"/>
  <path d="M156 440 Q158 454 170 458 Q194 458 204 440Z"/>
</svg>
