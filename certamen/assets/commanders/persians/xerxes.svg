<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" fill="#1a0a04">
  <!-- Xerxes — hoge kroon/tiara, rijke gewaden, scepter, koninklijke pose -->
  <!-- Hoge persische tiara/kroon -->
  <path d="M128 18 Q130 10 150 8 Q170 10 172 18 L176 62 L150 58 L124 62Z"/>
  <!-- Kroonrand met juwelen -->
  <rect x="118" y="60" width="64" height="12" rx="4"/>
  <circle cx="132" cy="66" r="5"/>
  <circle cx="150" cy="66" r="5"/>
  <circle cx="168" cy="66" r="5"/>
  <!-- Hoofd -->
  <ellipse cx="150" cy="100" rx="34" ry="36"/>
  <!-- Baard (gekruld, koninklijk) -->
  <path d="M120 122 Q124 140 130 148 Q140 158 150 160 Q160 158 170 148 Q176 140 180 122 L174 132 Q165 150 150 152 Q135 150 126 132Z"/>
  <!-- Nek/ketting -->
  <rect x="138" y="134" width="24" height="14" rx="4"/>
  <!-- Rijke gewaden (lang en wijd) -->
  <path d="M86 148 Q100 136 150 134 Q200 136 214 148 L232 480 L68 480Z"/>
  <!-- Gewad detail/borduursel -->
  <path d="M110 200 Q150 196 190 200" stroke="#0a0500" stroke-width="3" fill="none"/>
  <path d="M104 250 Q150 246 196 250" stroke="#0a0500" stroke-width="3" fill="none"/>
  <path d="M100 300 Q150 296 200 300" stroke="#0a0500" stroke-width="3" fill="none"/>
  <!-- Lange mouwen -->
  <path d="M86 155 L42 200 L36 228 L78 192Z"/>
  <path d="M214 155 L258 200 L264 228 L222 192Z"/>
  <!-- Linkerhand met scepter -->
  <ellipse cx="30" cy="236" rx="14" ry="12"/>
  <!-- Scepter -->
  <rect x="26" y="60" width="8" height="180" rx="3"/>
  <!-- Sceptertop (bol) -->
  <circle cx="30" cy="58" r="14"/>
  <!-- Rechterhand gestrekt (koninklijk gebaar) -->
  <ellipse cx="270" cy="216" rx="14" ry="12"/>
  <!-- Voeten in sandalen (zichtbaar onder gewaden) -->
  <path d="M124 476 Q134 492 152 492 Q168 488 172 476Z"/>
  <path d="M128 476 Q148 480 176 476"/>
</svg>
