<!DOCTYPE html>
<html lang="nl" data-taal="la">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stijlfiguren · Klassieke Talen</title>
<style>
  :root{
    --bg:#16140f;
    --bg-2:#1d1b14;
    --panel:#221f17;
    --panel-2:#2a261c;
    --line:#3a3527;
    --ink:#ece2cc;
    --ink-soft:#cabfa4;
    --muted:#9c9078;
    --gold:#c9a24a;
    /* accenten wisselen per taal */
    --accent:#c9a24a;
    --accent-2:#8a3324;
    --accent-soft:#3a2c1c;
    --halo:rgba(201,162,74,.16);
    --radius:7px;
    --serif:"Palatino Linotype","Palatino","Book Antiqua",Georgia,"Times New Roman",serif;
    --grieks:"Palatino Linotype",Palatino,"Noto Serif","DejaVu Serif",Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  html[data-taal="gr"]{
    --accent:#5a8fb8;
    --accent-2:#c4663a;
    --accent-soft:#1f2c33;
    --halo:rgba(90,143,184,.18);
    --bg:#10130f;
    --bg-2:#14180f;
    --panel:#191e16;
    --panel-2:#1f261c;
    --line:#2c3528;
    --ink:#e7e6d6;
    --ink-soft:#bcc2ac;
    --muted:#8a9580;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--serif);
    line-height:1.5;
    -webkit-text-size-adjust:100%;
    -webkit-font-smoothing:antialiased;
    min-height:100dvh;
    transition:background .5s ease;
  }
  body::before{
    /* subtiele "steen" textuur */
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(circle at 18% 12%,var(--halo),transparent 42%),
      radial-gradient(circle at 84% 88%,var(--halo),transparent 46%);
    opacity:.9;transition:background .5s ease;
  }
  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 18px 80px;}

  /* ---------- Masthead ---------- */
  header{padding:34px 0 10px;text-align:center;}
  .crest{
    width:58px;height:58px;margin:0 auto 14px;display:block;
  }
  .eyebrow{
    font-family:var(--sans);font-size:.66rem;letter-spacing:.42em;text-transform:uppercase;
    color:var(--muted);margin:0 0 10px;padding-left:.42em;
  }
  h1{
    font-family:var(--serif);font-weight:600;
    font-size:clamp(2rem,6.5vw,3.3rem);
    letter-spacing:.16em;text-transform:uppercase;
    margin:0;color:var(--ink);
    text-indent:.16em;
  }
  .rule{
    width:min(420px,80%);height:0;margin:16px auto 6px;border:0;
    border-top:1px solid var(--accent);position:relative;opacity:.85;
  }
  .rule::after{content:"";position:absolute;left:0;right:0;top:3px;border-top:1px solid var(--accent);opacity:.45;}
  .tagline{font-family:var(--sans);font-size:.82rem;color:var(--ink-soft);letter-spacing:.04em;margin:14px 0 0;}

  /* ---------- Taalschakelaar ---------- */
  .toggle{
    display:inline-flex;margin:24px auto 6px;border:1px solid var(--line);
    border-radius:999px;overflow:hidden;background:var(--panel);
  }
  .toggle button{
    appearance:none;border:0;background:transparent;cursor:pointer;
    font-family:var(--sans);font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);padding:11px 26px;min-height:44px;transition:.25s;
  }
  .toggle button[aria-pressed="true"]{
    background:linear-gradient(180deg,var(--accent),color-mix(in srgb,var(--accent) 78%,#000));
    color:#16140f;font-weight:600;
  }
  .toggle button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  /* ---------- Bedieningsbalk ---------- */
  .controls{margin:26px 0 6px;}
  .searchwrap{position:relative;max-width:520px;margin:0 auto 16px;}
  .searchwrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted);}
  #zoek{
    width:100%;font-family:var(--serif);font-size:16px;color:var(--ink);
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 14px 13px 40px;min-height:48px;
  }
  #zoek::placeholder{color:var(--muted);}
  #zoek:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}

  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
  .chip{
    appearance:none;cursor:pointer;font-family:var(--sans);font-size:.74rem;letter-spacing:.05em;
    color:var(--ink-soft);background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:8px 15px;min-height:38px;transition:.2s;
  }
  .chip[aria-pressed="true"]{border-color:var(--accent);color:var(--ink);background:var(--accent-soft);}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .meta{font-family:var(--sans);font-size:.76rem;color:var(--muted);text-align:center;margin:20px 0 4px;letter-spacing:.04em;}

  /* ---------- Kaartenraster ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px;margin-top:14px;}
  .card{
    position:relative;text-align:left;cursor:pointer;
    background:linear-gradient(180deg,var(--panel),var(--bg-2));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 16px 15px;color:var(--ink);font-family:var(--serif);
    transition:transform .15s ease,border-color .2s ease,box-shadow .2s ease;
    overflow:hidden;
  }
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:.7;}
  .card:hover,.card:focus-visible{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 6px 22px rgba(0,0,0,.35);outline:none;}
  .card .cat{font-family:var(--sans);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin:0 0 7px;}
  .card .naam{font-size:1.22rem;letter-spacing:.02em;margin:0 0 6px;font-weight:600;}
  .card .kort{font-size:.92rem;color:var(--ink-soft);margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card .tags{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-family:var(--sans);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:4px;padding:2px 6px;}
  .tag.auteur{color:var(--accent-2);border-color:color-mix(in srgb,var(--accent-2) 50%,var(--line));}

  .leeg{text-align:center;color:var(--muted);font-family:var(--sans);padding:48px 0;font-size:.95rem;}

  /* ---------- Detail (sheet/modal) ---------- */
  .overlay{
    position:fixed;inset:0;z-index:30;background:rgba(8,7,5,.62);
    display:none;align-items:flex-end;justify-content:center;
    backdrop-filter:blur(2px);
  }
  .overlay.open{display:flex;}
  .sheet{
    width:100%;max-width:720px;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:var(--panel);border:1px solid var(--line);
    border-radius:14px 14px 0 0;padding:0 0 34px;
    animation:rise .28s ease;
  }
  @media(min-width:680px){
    .overlay{align-items:center;}
    .sheet{border-radius:14px;max-height:88dvh;}
  }
  @keyframes rise{from{transform:translateY(26px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
  .sheet-head{
    position:sticky;top:0;z-index:2;background:var(--panel);
    border-bottom:1px solid var(--line);padding:16px 22px 14px;
  }
  .back{
    appearance:none;background:transparent;border:0;cursor:pointer;color:var(--accent);
    font-family:var(--sans);font-size:.78rem;letter-spacing:.08em;display:inline-flex;align-items:center;gap:7px;
    padding:6px 2px;min-height:40px;
  }
  .back svg{width:15px;height:15px;}
  .sheet-cat{font-family:var(--sans);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin:8px 0 4px;}
  .sheet h2{font-family:var(--serif);font-size:clamp(1.7rem,5vw,2.2rem);letter-spacing:.03em;margin:0;font-weight:600;}
  .sheet-tags{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap;}
  .ttag{font-family:var(--sans);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:5px;border:1px solid var(--line);color:var(--ink-soft);}
  .ttag.la{color:#e6c46e;border-color:#6e5524;}
  .ttag.gr{color:#7fb1d6;border-color:#365063;}
  .ttag.auteur{color:var(--accent-2);border-color:color-mix(in srgb,var(--accent-2) 55%,var(--line));}

  .sheet-body{padding:20px 22px 0;}
  .def{font-size:1.12rem;color:var(--ink);margin:0 0 6px;}
  .note{font-family:var(--sans);font-size:.85rem;color:var(--muted);background:var(--bg-2);border-left:2px solid var(--accent);padding:9px 12px;border-radius:4px;margin:14px 0 0;}

  .vb-titel{font-family:var(--sans);font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin:26px 0 4px;}
  .vb-titel .lijn{display:inline-block;width:32px;height:1px;background:var(--accent);vertical-align:middle;margin-left:10px;}

  .vb{
    position:relative;margin:14px 0;padding:14px 16px 14px 18px;
    background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);
  }
  .vb::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:2px;background:var(--accent);opacity:.6;}
  .tessera{
    display:inline-block;font-family:var(--sans);font-size:.58rem;letter-spacing:.14em;font-weight:700;
    padding:3px 8px;border-radius:4px;margin-bottom:9px;text-transform:uppercase;
  }
  .tessera.nl{background:#2a3a2a;color:#bfe0bf;}
  .tessera.en{background:#2c3242;color:#bccbe6;}
  .tessera.gr{background:#27343d;color:#9fc9e6;}
  .tessera.la{background:#3a2f1c;color:#e3c576;}
  .vb-tekst{font-size:1.16rem;color:var(--ink);margin:0;}
  .vb-tekst.grieks{font-family:var(--grieks);font-size:1.28rem;line-height:1.55;}
  .vb-tekst.latijn{font-style:italic;}
  .vb-vert{font-family:var(--serif);font-size:.98rem;color:var(--ink-soft);margin:7px 0 0;font-style:italic;}
  .vb-bron{font-family:var(--sans);font-size:.7rem;letter-spacing:.06em;color:var(--muted);margin:8px 0 0;text-transform:uppercase;}

  footer{margin-top:54px;padding-top:18px;border-top:1px solid var(--line);text-align:center;}
  footer p{font-family:var(--sans);font-size:.72rem;letter-spacing:.06em;color:var(--muted);margin:4px 0;}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="crest" id="crest" viewBox="0 0 60 60" aria-hidden="true"></svg>
    <p class="eyebrow">Klassieke Talen · VWO bovenbouw</p>
    <h1>Stijlfiguren</h1>
    <hr class="rule">
    <p class="tagline">Stilistiek · narratologie · argumentatie — voor het Centraal Examen</p>

    <div class="toggle" role="group" aria-label="Kies taal">
      <button id="btn-la" aria-pressed="true" onclick="kiesTaal('la')">Latijn</button>
      <button id="btn-gr" aria-pressed="false" onclick="kiesTaal('gr')">Grieks</button>
    </div>
  </header>

  <section class="controls" aria-label="Filteren en zoeken">
    <div class="searchwrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="zoek" type="search" inputmode="search" autocomplete="off" placeholder="Zoek een stijlfiguur of trefwoord…" aria-label="Zoeken" oninput="render()">
    </div>
    <div class="chips" id="chips" role="group" aria-label="Categorie"></div>
  </section>

  <p class="meta" id="teller"></p>
  <div class="grid" id="grid"></div>
  <p class="leeg" id="leeg" hidden>Geen stijlfiguren gevonden. Pas je zoekterm of categorie aan.</p>

  <footer>
    <p>Stijlfiguren · interactief overzicht voor Latijn &amp; Grieks</p>
    <p>© Gerben de Jong · 2026</p>
  </footer>
</div>

<!-- Detailweergave -->
<div class="overlay" id="overlay" onclick="if(event.target===this)sluit()">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="d-naam">
    <div class="sheet-head">
      <button class="back" onclick="sluit()" aria-label="Terug naar overzicht">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>Terug
      </button>
      <p class="sheet-cat" id="d-cat"></p>
      <h2 id="d-naam"></h2>
      <div class="sheet-tags" id="d-tags"></div>
    </div>
    <div class="sheet-body" id="d-body"></div>
  </div>
</div>

<script>

   talen: welke minimumlijst(en) het figuur verplicht stelt  ('la' / 'gr')

   vb: voorbeelden  l = taal (nl/en/gr/la), t = tekst, v = NL-vertaling, b = bron
   ========================================================================= */

  ["alle","Alle"],
  ["klank","Klank-, woord- & zinfiguren"],

{naam:"Hypallage",cat:"klank",talen:["gr"],

{naam:"Dichterlijk meervoud",cat:"klank",talen:["gr"],auteur:"poëzie",

{naam:"Ellips",cat:"klank",talen:["la"],auteur:"o.a. Cicero",

{naam:"Vergelijking",cat:"gedachte",talen:["la","gr"],
 def:"Een begrip wordt vergeleken met een ander begrip, met behulp van ‘als’, ‘zoals’, ‘gelijk aan’ e.d.",

  {l:"la",t:"cruor emicat alte, / non aliter quam cum vitiato fistula plumbo / scinditur…",v:"Het bloed spuit hoog op, net zoals wanneer een loden buis met een gebrek openbarst…",b:"Ovidius, Metamorphoses 4.121-123"},
  {l:"gr",t:"οἳ δὲ λύκοι ὣς / ἀλλήλοις ἐπόρουσαν.",v:"en zij stormden als wolven op elkaar af.",b:"Homerus, Ilias 4.471-472"}
 ]},
{naam:"Metafoor",cat:"gedachte",talen:["la","gr"],

  {l:"en",t:"Time is money."},

  {l:"gr",t:"ἐς δὲ τὴν τύχην / πεσοῦσ' ὅσην… πῶς ἂν ἐκνεῦσαι δοκεῖς;",v:"nu je in zo'n moeilijke situatie terecht bent gekomen, hoe denk je er dan uit te kunnen zwemmen (= ontsnappen)?",b:"Euripides, Hippolytus 469-470"}
 ]},
{naam:"Metonymia",cat:"gedachte",talen:["gr"],
 def:"De vervanging van een begrip door een begrip dat er nauw mee samenhangt.",

{naam:"Vertelperspectief",cat:"narr",talen:["la","gr"],

/* =========================================================================
   App-logica
   ========================================================================= */
let huidigeTaal = "la";
let huidigeCat = "alle";

const crestLA = '<g fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="30" cy="30" r="26"/><path d="M30 8v44M14 22h32M16 38h28" stroke-width="1.6"/></g><text x="30" y="35" text-anchor="middle" font-family="var(--serif)" font-size="13" font-weight="700" letter-spacing="1" fill="var(--accent)">SPQR</text>';
const crestGR = '<g fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="30" cy="30" r="26"/></g><text x="30" y="40" text-anchor="middle" font-family="var(--grieks)" font-size="30" font-weight="700" fill="var(--accent)">Α</text>';

function buildChips(){
  const c = document.getElementById("chips");
  c.innerHTML = "";
  CATS.forEach(([id,label])=>{
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = label;
    b.setAttribute("aria-pressed", id===huidigeCat ? "true":"false");
    b.onclick = ()=>{ huidigeCat = id; buildChips(); render(); };
    c.appendChild(b);
  });
}

function kiesTaal(t){
  huidigeTaal = t;
  document.documentElement.setAttribute("data-taal", t);
  document.getElementById("btn-la").setAttribute("aria-pressed", t==="la"?"true":"false");
  document.getElementById("btn-gr").setAttribute("aria-pressed", t==="gr"?"true":"false");
  document.getElementById("crest").innerHTML = t==="la" ? crestLA : crestGR;
  render();
}

function catLabel(id){ const f = CATS.find(c=>c[0]===id); return f?f[1]:""; }

function gefilterd(){
  const q = document.getElementById("zoek").value.trim().toLowerCase();
  return DATA.filter(f=>{
    if(!f.talen.includes(huidigeTaal)) return false;
    if(huidigeCat!=="alle" && f.cat!==huidigeCat) return false;
    if(q){
      const hooi = (f.naam+" "+f.def+" "+(f.extra||"")+" "+(f.auteur||"")).toLowerCase();
      if(!hooi.includes(q)) return false;
    }
    return true;
  });
}

function render(){
  const lijst = gefilterd();
  const grid = document.getElementById("grid");
  const leeg = document.getElementById("leeg");
  const teller = document.getElementById("teller");

  // sorteer per categorie-volgorde, dan alfabetisch
  const order = CATS.map(c=>c[0]);
  lijst.sort((a,b)=>{
    const d = order.indexOf(a.cat)-order.indexOf(b.cat);
    return d!==0 ? d : a.naam.localeCompare(b.naam,"nl");
  });

  teller.textContent = lijst.length + " stijlfiguren · minimumlijst " + (huidigeTaal==="la"?"Latijn":"Grieks");

  grid.innerHTML = "";
  if(lijst.length===0){ leeg.hidden=false; return; }
  leeg.hidden=true;

  lijst.forEach((f)=>{
    const i = DATA.indexOf(f);
    const card = document.createElement("button");
    card.className = "card";
    card.type = "button";
    card.onclick = ()=>open(i);
    let tags = '<span class="tag">'+catLabel(f.cat).split(" ")[0]+'</span>';
    if(f.auteur) tags += '<span class="tag auteur">'+f.auteur+'</span>';
    card.innerHTML =
      '<p class="cat">'+catLabel(f.cat)+'</p>'+
      '<p class="naam">'+f.naam+'</p>'+
      '<p class="kort">'+f.def+'</p>'+
      '<div class="tags">'+tags+'</div>';
    grid.appendChild(card);
  });
}

const namen = {nl:"Nederlands",en:"Engels",gr:"Grieks",la:"Latijn"};
function open(i){
  const f = DATA[i];
  document.getElementById("d-cat").textContent = catLabel(f.cat);
  document.getElementById("d-naam").textContent = f.naam;

  let tags = "";
  if(f.talen.includes("la")) tags += '<span class="ttag la">Examen Latijn</span>';
  if(f.talen.includes("gr")) tags += '<span class="ttag gr">Examen Grieks</span>';
  if(f.auteur) tags += '<span class="ttag auteur">'+f.auteur+'</span>';
  document.getElementById("d-tags").innerHTML = tags;

  let body = '<p class="def">'+f.def+'</p>';
  if(f.extra) body += '<div class="note">'+f.extra+'</div>';
  body += '<p class="vb-titel">Voorbeelden<span class="lijn"></span></p>';

  f.vb.forEach(v=>{
    let cls = "vb-tekst";
    if(v.l==="gr") cls += " grieks";
    if(v.l==="la") cls += " latijn";
    body += '<div class="vb">';
    body += '<span class="tessera '+v.l+'">'+namen[v.l]+'</span>';
    body += '<p class="'+cls+'">'+v.t+'</p>';
    if(v.v) body += '<p class="vb-vert">'+v.v+'</p>';
    if(v.b) body += '<p class="vb-bron">'+v.b+'</p>';
    body += '</div>';
  });

  document.getElementById("d-body").innerHTML = body;
  const ov = document.getElementById("overlay");
  ov.classList.add("open");
  ov.querySelector(".sheet").scrollTop = 0;
  document.body.style.overflow = "hidden";
}
function sluit(){
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown",e=>{ if(e.key==="Escape") sluit(); });

/* init */
buildChips();
kiesTaal("la");
</script>
