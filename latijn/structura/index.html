<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Latijn Ontleedcoach</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');
  :root {
    --parchment:#f5efe0;--parchment-dark:#e8dfc8;--ink:#2c1e0f;--ink-light:#5a3e28;
    --red:#8b1a1a;--gold:#b8860b;--gold-light:#d4a017;--green:#2d6a4f;--blue:#1a3a5c;
    --purple:#5c2d6a;--orange:#8b4500;--teal:#1a5c52;--grey:#6b6b6b;--white:#fffdf7;
    --shadow:0 4px 24px rgba(44,30,15,0.13);--shadow-sm:0 2px 8px rgba(44,30,15,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

  /* Prevent iOS double-tap zoom on buttons */
  button { touch-action: manipulation; }

  @media (max-width: 400px) {
    header h1 { font-size: 1.15rem; }
    .header-sub { display: none; }
    .progress-badge { font-size: 0.7rem; padding: 4px 9px; }
    .screen { padding: 14px 10px 48px; }
    .level-card { padding: 14px 14px; gap: 12px; }
    .level-num { font-size: 1.6rem; width: 36px; }
    .level-info h3 { font-size: 0.95rem; }
    .level-info p { font-size: 0.74rem; }
    .word-btn { font-size: 1rem; padding: 8px 10px; }
    .instruction-text { font-size: 0.85rem; }
    .hint { font-size: 0.74rem; }
    .step-pill { font-size: 0.68rem; padding: 6px 9px; }
    .vw-btn { font-size: 0.76rem; padding: 9px 6px; }
    .gloss-latin { font-size: 0.82rem; }
    .gloss-nl { font-size: 0.66rem; }
    .gloss-card { padding: 5px 8px; }
    .btn-primary { padding: 14px; font-size: 0.95rem; }
    .translation-input { font-size: 0.95rem; }
    .score-banner .score-num { font-size: 2.6rem; }
  }
  body{font-family:'Source Serif 4',Georgia,serif;background:var(--parchment);color:var(--ink);min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 50%,rgba(184,134,11,0.07) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(139,26,26,0.06) 0%,transparent 50%);}

  /* HEADER */
  header{background:var(--ink);color:var(--parchment);padding:16px 20px 12px;display:flex;align-items:center;
    justify-content:space-between;box-shadow:0 2px 12px rgba(44,30,15,0.25);position:sticky;top:0;z-index:100;}
  header h1{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;letter-spacing:0.03em;line-height:1;}
  header h1 span{color:var(--gold-light);}
  .header-sub{font-size:0.68rem;color:var(--parchment-dark);margin-top:2px;letter-spacing:0.08em;text-transform:uppercase;}
  .progress-badge{background:var(--gold);color:var(--ink);border-radius:20px;padding:4px 12px;font-size:0.78rem;font-weight:700;font-family:'Playfair Display',serif;white-space:nowrap;}

  /* SCREENS */
  .screen{display:none;padding:20px 14px 48px;max-width:720px;margin:0 auto;}
  .screen.active{display:block;}

  /* LEVEL SELECT */
  .level-intro{text-align:center;margin-bottom:28px;}
  .level-intro h2{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;margin-bottom:6px;}
  .level-intro p{color:var(--ink-light);font-size:0.92rem;font-style:italic;line-height:1.6;}
  .levels-grid{display:flex;flex-direction:column;gap:12px;}
  .level-card{background:var(--white);border:2px solid var(--parchment-dark);border-radius:14px;padding:18px 20px;
    cursor:pointer;transition:all 0.18s ease;box-shadow:var(--shadow-sm);display:flex;align-items:center;
    gap:16px;position:relative;overflow:hidden;}
  .level-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:14px 0 0 14px;}
  .level-card:nth-child(1)::before{background:var(--green);}
  .level-card:nth-child(2)::before{background:var(--blue);}
  .level-card:nth-child(3)::before{background:var(--gold);}
  .level-card:nth-child(4)::before{background:var(--orange);}
  .level-card:nth-child(5)::before{background:var(--red);}
  .level-card:active{transform:scale(0.98);background:var(--parchment);}
  .level-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;line-height:1;width:44px;text-align:center;flex-shrink:0;}
  .level-card:nth-child(1) .level-num{color:var(--green);}
  .level-card:nth-child(2) .level-num{color:var(--blue);}
  .level-card:nth-child(3) .level-num{color:var(--gold);}
  .level-card:nth-child(4) .level-num{color:var(--orange);}
  .level-card:nth-child(5) .level-num{color:var(--red);}
  .level-info h3{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:2px;}
  .level-info p{font-size:0.8rem;color:var(--ink-light);font-style:italic;line-height:1.4;}
  .level-count{margin-left:auto;font-size:0.72rem;color:var(--grey);text-align:right;flex-shrink:0;}

  /* EXERCISE HEADER */
  .ex-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .btn-back{background:none;border:2px solid var(--parchment-dark);border-radius:10px;padding:7px 12px;cursor:pointer;
    font-size:0.82rem;color:var(--ink-light);font-family:'Source Serif 4',serif;transition:all 0.15s;flex-shrink:0;}
  .btn-back:active{background:var(--parchment-dark);}
  .ex-title{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;}
  .ex-counter{margin-left:auto;font-size:0.8rem;color:var(--grey);flex-shrink:0;}

  /* PROGRESS BAR */
  .progress-bar-wrap{background:var(--parchment-dark);border-radius:20px;height:5px;margin-bottom:16px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:20px;transition:width 0.4s ease;}

  /* PSOLMO PILLS — scrollable row */
  .psolmo-steps{display:flex;gap:5px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
  .psolmo-steps::-webkit-scrollbar{height:3px;}
  .psolmo-steps::-webkit-scrollbar-thumb{background:var(--parchment-dark);border-radius:3px;}
  .step-pill{
    padding:7px 11px;border-radius:20px;font-size:0.73rem;font-weight:700;letter-spacing:0.03em;
    border:2px solid transparent;transition:all 0.2s;opacity:0.38;white-space:nowrap;
    cursor:pointer;flex-shrink:0;font-family:'Source Serif 4',serif;
  }
  .step-pill.active{opacity:1;transform:scale(1.06);box-shadow:0 2px 8px rgba(0,0,0,0.15);}
  .step-pill.done{opacity:0.72;}
  .step-pill.locked{cursor:default;}
  .step-pill[data-step="P"]   {background:#e8f4e8;color:var(--green); border-color:var(--green);}
  .step-pill[data-step="S"]   {background:#e8f4f2;color:var(--teal);  border-color:var(--teal);}
  .step-pill[data-step="A"]   {background:#fef9e0;color:#7a5c00;      border-color:#b89000;}
  .step-pill[data-step="ACI"]  {background:#f5e8f5;color:#8b3a8b;     border-color:#8b3a8b;}
  .step-pill[data-step="ABLABS"]{background:#e0f0f0;color:#2e6b6b;     border-color:#2e6b6b;}
  .step-pill[data-step="O"]   {background:#e8eef8;color:var(--blue);  border-color:var(--blue);}
  .step-pill[data-step="L"]   {background:#fdf3e8;color:var(--orange);border-color:var(--orange);}
  .step-pill[data-step="M"]   {background:#f3e8fd;color:var(--purple);border-color:var(--purple);}
  .step-pill[data-step="Rest"]{background:#f8e8e8;color:var(--red);   border-color:var(--red);}

  /* A-GROUP COLOURS — up to 5 groups per sentence */
  .word-btn.tagged-A1{background:#fff8cc;border-color:#c9a800;color:#7a5c00;font-weight:700;}
  .word-btn.tagged-A2{background:#fce8ff;border-color:#9b30c0;color:#6a1a8a;font-weight:700;}
  .word-btn.tagged-A3{background:#e0f7ff;border-color:#1a7fa0;color:#0d4a60;font-weight:700;}
  .word-btn.tagged-A4{background:#fff0e0;border-color:#c06030;color:#7a3000;font-weight:700;}
  .word-btn.tagged-A5{background:#e8ffe8;border-color:#30a050;color:#0a4a20;font-weight:700;}
  .tagged-A1 .word-tag{background:#c9a800;}
  .tagged-A2 .word-tag{background:#9b30c0;}
  .tagged-A3 .word-tag{background:#1a7fa0;}
  .tagged-A4 .word-tag{background:#c06030;}
  .tagged-A5 .word-tag{background:#30a050;}

  /* INSTRUCTION BOX */
  .instruction-box{background:var(--white);border-left:4px solid var(--gold);border-radius:0 12px 12px 0;
    padding:12px 14px;margin-bottom:16px;box-shadow:var(--shadow-sm);}
  .step-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);font-weight:700;margin-bottom:3px;}
  .instruction-text{font-size:0.92rem;color:var(--ink);line-height:1.5;}
  .hint{font-size:0.78rem;color:var(--ink-light);font-style:italic;margin-top:4px;}

  /* SENTENCE CARD */
  .sentence-card{background:var(--white);border:2px solid var(--parchment-dark);border-radius:16px;
    padding:20px 16px;margin-bottom:14px;box-shadow:var(--shadow);text-align:center;}
  .sentence-context{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--grey);margin-bottom:10px;}
  .sentence-words{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;line-height:1;}

  /* WORD BUTTONS */
  .word-btn{
    font-family:'Playfair Display',serif;font-size:1.18rem;font-style:italic;
    padding:9px 12px;border-radius:10px;border:2px solid var(--parchment-dark);
    background:var(--parchment);cursor:pointer;transition:all 0.15s;color:var(--ink);position:relative;
  }
  .word-btn:active{transform:scale(0.94);}
  .word-btn.selectable:hover{border-color:var(--gold);background:#fdf9f0;}
  .word-btn.tagged-P   {background:#e8f4e8;border-color:var(--green); color:var(--green); font-weight:700;}
  .word-btn.tagged-Sn  {background:#d4f0e8;border-color:var(--teal);  color:var(--teal);  font-weight:700;}
  .word-btn.tagged-So  {background:#c8e8e0;border-color:#0d4a40;      color:#0d4a40;       font-weight:700;}
  .word-btn.tagged-O   {background:#e8eef8;border-color:var(--blue);  color:var(--blue);  font-weight:700;}
  .word-btn.tagged-L   {background:#fdf3e8;border-color:var(--orange);color:var(--orange);font-weight:700;}
  .word-btn.tagged-M   {background:#f3e8fd;border-color:var(--purple);color:var(--purple);font-weight:700;}
  .word-btn.tagged-Rest{background:#f8e8e8;border-color:var(--red);   color:var(--red);   font-weight:700;}
  .word-btn.tagged-ACI   {background:#f5e8f5;border-color:#8b3a8b;color:#8b3a8b;font-weight:700;}
  .tagged-ACI .word-tag  {background:#8b3a8b;}
  .word-btn.tagged-ABLABS{background:#e0f0f0;border-color:#2e6b6b;color:#2e6b6b;font-weight:700;}
  .tagged-ABLABS .word-tag{background:#2e6b6b;}
  .word-btn.wrong{animation:shake 0.3s ease;border-color:#cc0000!important;background:#fff0f0!important;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  /* WORD TAG BADGE */
  .word-tag{position:absolute;top:-7px;right:-7px;min-width:17px;height:17px;border-radius:9px;padding:0 3px;
    font-size:7.5px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-style:normal;font-family:'Source Serif 4',serif;}
  .tagged-P    .word-tag{background:var(--green);}
  .tagged-Sn   .word-tag{background:var(--teal);}
  .tagged-So   .word-tag{background:#0d4a40;}
  .tagged-O    .word-tag{background:var(--blue);}
  .tagged-L    .word-tag{background:var(--orange);}
  .tagged-M    .word-tag{background:var(--purple);}
  .tagged-Rest .word-tag{background:var(--red);}

  /* VOEGWOORD TYPE CHOOSER — shown after tapping a conjunction word */
  .vw-chooser{display:none;background:var(--white);border:2px solid var(--teal);border-radius:14px;
    padding:14px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
  .vw-chooser.show{display:block;}
  .vw-chooser p{font-size:0.85rem;margin-bottom:10px;color:var(--ink);}
  .vw-chooser strong{font-family:'Playfair Display',serif;font-style:italic;}
  .vw-btns{display:flex;gap:8px;}
  .vw-btn{flex:1;padding:10px 8px;border-radius:10px;border:2px solid;cursor:pointer;font-family:'Source Serif 4',serif;
    font-size:0.82rem;font-weight:700;transition:all 0.15s;text-align:center;}
  .vw-btn.neven{background:#e8f4f2;border-color:var(--teal);color:var(--teal);}
  .vw-btn.neven:active{background:var(--teal);color:white;}
  .vw-btn.onder{background:#c8e8e0;border-color:#0d4a40;color:#0d4a40;}
  .vw-btn.onder:active{background:#0d4a40;color:white;}

  /* SKIP / GEEN BUTTON */
  .skip-btn{display:block;width:100%;background:none;border:2px dashed var(--parchment-dark);border-radius:10px;
    padding:9px;color:var(--grey);font-family:'Source Serif 4',serif;font-size:0.82rem;cursor:pointer;
    margin-bottom:14px;transition:all 0.15s;}
  .skip-btn:active{background:var(--parchment-dark);}

  /* FEEDBACK */
  .feedback-box{border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:0.88rem;line-height:1.5;display:none;}
  .feedback-box.show{display:block;}
  .feedback-box.correct  {background:#e8f4e8;border:2px solid var(--green);color:#1a4a2e;}
  .feedback-box.incorrect{background:#fdf0e8;border:2px solid var(--orange);color:#5a2e0f;}
  .feedback-box strong{display:block;margin-bottom:3px;}

  /* TRANSLATION */
  .translation-section{margin-top:6px;}
  .translation-section label{display:block;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--ink-light);margin-bottom:7px;font-weight:600;}
  .translation-input{width:100%;border:2px solid var(--parchment-dark);border-radius:12px;padding:12px 14px;
    font-family:'Source Serif 4',serif;font-size:1rem;color:var(--ink);background:var(--white);
    resize:none;min-height:78px;transition:border-color 0.15s;-webkit-appearance:none;}
  .translation-input:focus{outline:none;border-color:var(--gold);}

  /* BUTTONS */
  .btn-primary{width:100%;background:var(--ink);color:var(--parchment);border:none;border-radius:12px;
    padding:15px;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;cursor:pointer;
    margin-top:10px;transition:all 0.15s;letter-spacing:0.03em;}
  .btn-primary:active{transform:scale(0.98);background:var(--ink-light);}
  .btn-primary.gold{background:var(--gold);color:var(--ink);}

  /* RESULT SCREENS */
  .result-card{background:var(--white);border:2px solid var(--parchment-dark);border-radius:14px;
    padding:18px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
  .result-card .sentence-latin{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;margin-bottom:9px;color:var(--ink);}
  .result-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:5px;font-size:0.86rem;}
  .result-label{font-weight:700;min-width:76px;color:var(--ink-light);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;padding-top:1px;flex-shrink:0;}
  .result-value{color:var(--ink);line-height:1.4;}
  .result-value.student{font-style:italic;color:var(--blue);}
  .score-banner{text-align:center;background:var(--ink);color:var(--parchment);border-radius:16px;padding:22px;margin-bottom:22px;}
  .score-banner .score-num{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:900;color:var(--gold-light);line-height:1;}
  .score-banner .score-label{font-size:0.82rem;color:var(--parchment-dark);margin-top:3px;}
  .score-banner .score-msg{font-size:0.95rem;margin-top:9px;font-style:italic;}
  .divider{border:none;border-top:1px solid var(--parchment-dark);margin:10px 0;}

  /* WORD GLOSS LIST */
  .gloss-section{margin-top:0;margin-bottom:14px;display:none;}
  .gloss-section.show{display:block;}
  .gloss-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.09em;color:var(--ink-light);
    font-weight:700;margin-bottom:8px;}
  .gloss-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .gloss-card{
    border-radius:10px;border:2px solid;padding:6px 10px;min-width:60px;text-align:center;
    flex-shrink:0;transition:all 0.15s;
  }
  .gloss-latin{font-family:'Playfair Display',serif;font-style:italic;font-size:0.9rem;font-weight:700;display:block;line-height:1.2;}
  .gloss-nl{font-size:0.72rem;display:block;margin-top:2px;line-height:1.2;opacity:0.85;}
  /* gloss colors per PSAOLMO role */
  .gloss-P   {background:#e8f4e8;border-color:var(--green); color:var(--green);}
  .gloss-Sn  {background:#d4f0e8;border-color:var(--teal);  color:var(--teal);}
  .gloss-So  {background:#c8e8e0;border-color:#0d4a40;      color:#0d4a40;}
  .gloss-A1  {background:#fff8cc;border-color:#c9a800;color:#7a5c00;}
  .gloss-A2  {background:#fce8ff;border-color:#9b30c0;color:#6a1a8a;}
  .gloss-A3  {background:#e0f7ff;border-color:#1a7fa0;color:#0d4a60;}
  .gloss-A4  {background:#fff0e0;border-color:#c06030;color:#7a3000;}
  .gloss-A5  {background:#e8ffe8;border-color:#30a050;color:#0a4a20;}
  .gloss-O   {background:#e8eef8;border-color:var(--blue);  color:var(--blue);}
  .gloss-L   {background:#fdf3e8;border-color:var(--orange);color:var(--orange);}
  .gloss-M   {background:#f3e8fd;border-color:var(--purple);color:var(--purple);}
  .gloss-Rest{background:#f8e8e8;border-color:var(--red);   color:var(--red);}
  .gloss-ACI   {background:#f5e8f5;border-color:#8b3a8b;color:#8b3a8b;}
  .gloss-ABLABS{background:#e0f0f0;border-color:#2e6b6b;color:#2e6b6b;}
  .gloss-none{background:var(--parchment);border-color:var(--parchment-dark);color:var(--ink-light);}

  /* LEGEND */
  .legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--ink-light);}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
</style>
<style>.portal-back{position:fixed;top:10px;left:10px;z-index:9999;display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,.4);border:1px solid rgba(212,175,55,.35);color:#d4af37;text-decoration:none;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}.portal-back:hover{background:rgba(0,0,0,.65);border-color:rgba(212,175,55,.7);}.portal-back svg{width:22px;height:22px;display:block;}.portal-back+header{padding-left:54px;}</style>
</head>
<body>
<a class="portal-back" href="../" onclick="if(!document.getElementById('screenLevel').classList.contains('active')){event.preventDefault();goToLevelSelect();}" aria-label="Terug naar portaal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></a>
<header>
  <div>
    <h1>Latijn <span>Ontleedcoach</span></h1>
    <div class="header-sub">P·S·O·L·M·A·O — Stap voor stap</div>
  </div>
  <div class="progress-badge" id="headerBadge">Kies niveau</div>
</header>

<!-- SCREEN 1: LEVEL SELECT -->
<div class="screen active" id="screenLevel">
  <div class="level-intro">
    <h2>Kies een niveau</h2>
    <p>Ontleed Latijnse zinnen stap voor stap<br>via het P·S·O·L·M·A·O-systeem.</p>
  </div>
  <div class="levels-grid" id="levelsGrid"></div>
  <footer>Latijn Ontleedcoach · © Gerben de Jong · 2026</footer>
</div>

<!-- SCREEN 2: EXERCISE -->
<div class="screen" id="screenExercise">
  <div class="ex-header">
    <button class="btn-back" onclick="goToLevelSelect()">← Terug</button>
    <span class="ex-title" id="exTitle"></span>
    <span class="ex-counter" id="exCounter"></span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="psolmo-steps" id="psolmoSteps"></div>
  <div class="instruction-box" id="instructionBox">
    <div class="step-label" id="stepLabel"></div>
    <div class="instruction-text" id="stepInstruction"></div>
    <div class="hint" id="stepHint"></div>
  </div>
  <div class="sentence-card">
    <div class="sentence-context" id="sentenceContext"></div>
    <div class="sentence-words" id="sentenceWords"></div>
  </div>
  <!-- Voegwoord type chooser (shown when tapping a conjunction in S-step) -->
  <div class="vw-chooser" id="vwChooser">

// ============================================================
// APP STATE
// ============================================================
let state = {
  level:null, zinnen:[], zinIndex:0,
  currentStepKey:"P",
  selectedWords:{},     // wordIndex -> tag string
  completedSteps:{},    // stepKey -> true when done
  attrGroupsDone:new Set(), // set of group indices completed in A step
  pendingVwIndex:null,
  results:[]
};

// ============================================================
// INIT
// ============================================================
function init(){ renderLevelSelect(); }

function renderLevelSelect(){
  const grid=document.getElementById('levelsGrid');
  grid.innerHTML='';
  Object.entries(DATABASE).forEach(([lvl,data])=>{
    const card=document.createElement('div');
    card.className='level-card';
    card.innerHTML=`<div class="level-num">${lvl}</div>
      <div class="level-info"><h3>${data.naam}</h3><p>${data.beschrijving}</p></div>
      <div class="level-count">${data.zinnen.length} zinnen</div>`;
    card.onclick=()=>startLevel(parseInt(lvl));
    grid.appendChild(card);
  });
  showScreen('screenLevel');
  document.getElementById('headerBadge').textContent='Kies niveau';
}

function startLevel(lvl){
  state.level=lvl;
  PSOLMO=getStepsForLevel(lvl);
  const shuffled=[...DATABASE[lvl].zinnen].sort(()=>Math.random()-0.5);
  state.zinnen=shuffled.slice(0,Math.min(6,shuffled.length));
  state.zinIndex=0; state.results=[];
  document.getElementById('headerBadge').textContent=`Niveau ${lvl}`;
  loadZin(); showScreen('screenExercise');
}

function loadZin(){
  state.currentStepKey='P';
  state.selectedWords={};
  state.completedSteps={};
  state.attrGroupsDone=new Set();
  state.pendingVwIndex=null;
  const zin=state.zinnen[state.zinIndex];
  document.getElementById('exTitle').textContent=DATABASE[state.level].naam;
  document.getElementById('exCounter').textContent=`${state.zinIndex+1} / ${state.zinnen.length}`;
  document.getElementById('progressFill').style.width=`${(state.zinIndex/state.zinnen.length)*100}%`;
  document.getElementById('sentenceContext').textContent=zin.context;
  document.getElementById('vwChooser').classList.remove('show');
  document.getElementById('glossSection').classList.remove('show');
  document.getElementById('translationSection').style.display='none';
  document.getElementById('translationInput').value='';
  hideFeedback();
  renderWords(); renderPills(); loadStep();
}

// ============================================================
// RENDER WORDS
// ============================================================
function renderWords(){
  const zin=state.zinnen[state.zinIndex];
  const container=document.getElementById('sentenceWords');
  container.innerHTML='';
  zin.latijn.forEach((word,i)=>{
    const btn=document.createElement('button');
    btn.className='word-btn selectable';
    btn.dataset.index=i;
    const tag=state.selectedWords[i];
    if(tag){ btn.classList.add(`tagged-${tag}`); }
    const wordSpan=document.createElement('span');
    wordSpan.textContent=word;
    btn.appendChild(wordSpan);
    if(tag){
      const mark=document.createElement('span');
      mark.className='word-tag';
      const labels={P:'P',Sn:'S↔',So:'S↳',
        A1:'A1',A2:'A2',A3:'A3',A4:'A4',A5:'A5',
        O:'O',ACI:'AcI',ABLABS:'Abl',L:'L',M:'M',Rest:'✓'};
      mark.textContent=labels[tag]||tag;
      btn.appendChild(mark);
    }
    btn.onclick=()=>onWordTap(i);
    container.appendChild(btn);
  });
}

// ============================================================
// RENDER PILLS (clickable)
// ============================================================
function renderPills(){
  const container=document.getElementById('psolmoSteps');
  container.innerHTML='';
  PSOLMO.forEach(step=>{
    const pill=document.createElement('div');
    pill.className='step-pill';
    pill.dataset.step=step.key;
    const isActive=step.key===state.currentStepKey;
    const isDone=state.completedSteps[step.key];
    if(isActive) pill.classList.add('active');
    if(isDone)   pill.classList.add('done');
    const labels={P:'P — Persoonsvorm',S:'S — Voegwoord',O:'O — Onderwerp',
      ACI:'AcI',L:'L — Lijdend vw.',M:'M — Meewerk. vw.',ABLABS:'AblAbs',A:'A — Attribuutgroep',Rest:'O — Overig'};
    pill.textContent=(isDone?'✓ ':'')+labels[step.key];
    pill.onclick=()=>jumpToStep(step.key);
    container.appendChild(pill);
  });
}

// ============================================================
// JUMP TO STEP (free navigation via pills)
// ============================================================
function jumpToStep(key){
  if(key===state.currentStepKey) return;
  hideFeedback();
  document.getElementById('vwChooser').classList.remove('show');
  state.pendingVwIndex=null;
  state.currentStepKey=key;
  renderPills(); loadStep();
}

// ============================================================
// LOAD STEP
// ============================================================
function loadStep(){
  const step=PSOLMO.find(s=>s.key===state.currentStepKey);
  document.getElementById('stepLabel').textContent=step.label;
  document.getElementById('stepInstruction').textContent='';
  document.getElementById('stepHint').textContent='';
  document.getElementById('instructionBox').style.borderLeftColor=step.kleur;
  document.getElementById('stepLabel').style.color=step.kleur;
  const skipBtn=document.getElementById('skipBtn');
  if(step.heeftGeen){
    skipBtn.style.display='block';
    skipBtn.textContent=`↩ ${step.skipTekst}`;
  } else {
    skipBtn.style.display='none';
  }
  hideFeedback();
}

// ============================================================
// WORD TAP
// ============================================================
function onWordTap(wordIndex){
  if(state.pendingVwIndex!==null){
    document.getElementById('vwChooser').classList.remove('show');
    state.pendingVwIndex=null;
    return;
  }

  const step=PSOLMO.find(s=>s.key===state.currentStepKey);
  const zin=state.zinnen[state.zinIndex];
  const tag=state.selectedWords[wordIndex];

  // Un-tag if already tagged by current step
  if(tag && stepOfTag(tag)===state.currentStepKey){
    // For A-step: un-tag the whole group when kern is tapped again
    if(state.currentStepKey==='A'){
      const groupTag=tag;
      // Find and remove all words with this group tag
      Object.keys(state.selectedWords).forEach(k=>{
        if(state.selectedWords[k]===groupTag) delete state.selectedWords[k];
      });
      // Also remove if kern was tagged O/L/M but attrs need clearing
      const zin2=state.zinnen[state.zinIndex];
      const groups=zin2.psolmo.A||[];
      const gIdx=groups.findIndex(g=>g.kern===wordIndex);
      if(gIdx!==-1 && state.attrGroupsDone){
        state.attrGroupsDone.delete(gIdx);
        groups[gIdx].attr.forEach(i=>{ delete state.selectedWords[i]; });
      }
      state.completedSteps['A']=false;
    } else {
      delete state.selectedWords[wordIndex];
      state.completedSteps[state.currentStepKey]=false;
    }
    renderWords(); hideFeedback(); return;
  }
  // Already tagged by different step
  if(tag && stepOfTag(tag)!==state.currentStepKey){
    showFeedback(false,`Dit woord is al aangewezen als <strong>${tagLabel(tag)}</strong>. Ga naar die stap om het te wijzigen.`);
    return;
  }

  switch(state.currentStepKey){
    case 'P': handleP(wordIndex,zin,step); break;
    case 'S': handleS(wordIndex,zin,step); break;
    case 'A': handleA(wordIndex,zin,step); break;
    case 'ACI': handleDefault(wordIndex,zin,step); break;
    case 'ABLABS': handleDefault(wordIndex,zin,step); break;
    default:  handleDefault(wordIndex,zin,step); break;
  }
}

function handleP(wordIndex,zin,step){
  const correct=zin.psolmo.P;
  if(correct.includes(wordIndex)){
    state.selectedWords[wordIndex]='P';
    renderWords();
    const allDone=correct.every(i=>state.selectedWords[i]==='P');
    if(allDone){ stepDone(step,zin.uitleg.P); }
  } else {
    shake(wordIndex);
    showFeedback(false,'Niet de persoonsvorm. Zoek het vervoegde werkwoord (let op de uitgang: -t, -nt, -mus...).');
  }
}

function handleS(wordIndex,zin,step){
  const allS=[...zin.psolmo.S.Sn,...zin.psolmo.S.So];
  if(!allS.includes(wordIndex)){
    shake(wordIndex);
    showFeedback(false,'Dit is geen voegwoord in deze zin.');
    return;
  }
  state.pendingVwIndex=wordIndex;
  document.getElementById('vwWord').textContent=zin.latijn[wordIndex];
  document.getElementById('vwChooser').classList.add('show');
  hideFeedback();
}

function confirmVoegwoord(type){
  const wordIndex=state.pendingVwIndex;
  if(wordIndex===null) return;
  const zin=state.zinnen[state.zinIndex];
  const step=PSOLMO.find(s=>s.key==='S');
  const correctType=zin.psolmo.S.Sn.includes(wordIndex)?'Sn':'So';
  document.getElementById('vwChooser').classList.remove('show');
  state.pendingVwIndex=null;
  if(type===correctType){
    state.selectedWords[wordIndex]=type;
    renderWords();
    const allSn=zin.psolmo.S.Sn.every(i=>state.selectedWords[i]==='Sn');
    const allSo=zin.psolmo.S.So.every(i=>state.selectedWords[i]==='So');
    if(allSn&&allSo){ stepDone(step,zin.uitleg.S); }
    else { showFeedback(true,'Goed! Er zijn nog meer voegwoorden in deze zin.'); }
  } else {
    shake(wordIndex);
    const verwacht=correctType==='Sn'?'nevenschikkend':'onderschikkend';
    showFeedback(false,`Niet juist. Dit voegwoord is ${verwacht}. ${zin.uitleg.S}`);
  }
}

// ============================================================
// A-STEP: tap kern → auto-tag whole group
// ============================================================
function handleA(wordIndex,zin,step){
  const groups=zin.psolmo.A;
  if(!groups||groups.length===0){
    shake(wordIndex);
    showFeedback(false,'Er zijn geen attribuutgroepen in deze zin. Gebruik de knop hieronder.');
    return;
  }

  // Find which group this word belongs to (as kern or attr)
  const groupIdx=groups.findIndex(g=>g.kern===wordIndex||g.attr.includes(wordIndex));
  if(groupIdx===-1){
    shake(wordIndex);
    showFeedback(false,'Dit woord is geen kern of attribuut van een woordgroep. Tik op het hoofdsubstantief van de groep.');
    return;
  }

  const group=groups[groupIdx];
  // Only accept taps on the KERN word
  if(wordIndex!==group.kern){
    showFeedback(false,`Tik op het kernwoord van deze groep: <em>${zin.latijn[group.kern]}</em>. De app kleurt de attributen dan automatisch in.`);
    return;
  }

  // Assign group colour tag — kern keeps its O/L/M tag, only attrs get the A tag
  const groupTags=['A1','A2','A3','A4','A5'];
  const usedTags=new Set(Object.values(state.selectedWords).filter(t=>t&&t.startsWith('A')));
  const groupTag=groupTags.find(t=>!usedTags.has(t))||'A1';

  // Tag attrs with the group colour (kern stays as O/L/M)
  group.attr.forEach(i=>{ state.selectedWords[i]=groupTag; });
  // Also tag kern as groupTag IF it wasn't already tagged by O/L/M
  if(!state.selectedWords[group.kern]){
    state.selectedWords[group.kern]=groupTag;
  }
  // Store group completion marker separately
  if(!state.attrGroupsDone) state.attrGroupsDone=new Set();
  state.attrGroupsDone.add(groupIdx);

  renderWords();

  // Check if all groups are done
  const allDone=groups.every((_,i)=>state.attrGroupsDone&&state.attrGroupsDone.has(i));
  if(allDone){
    stepDone(step,zin.uitleg.A||'Goed! Alle woordgroepen zijn aangewezen.');
  } else {
    const remaining=groups.length-(state.attrGroupsDone?state.attrGroupsDone.size:0);
    showFeedback(true,`Groep gemarkeerd! Er ${remaining===1?'is nog 1 groep':'zijn nog '+remaining+' groepen'} te vinden.`);
  }
}

function handleDefault(wordIndex,zin,step){
  const key=step.key;
  const correct=zin.psolmo[key];
  if(correct.includes(wordIndex)){
    state.selectedWords[wordIndex]=key;
    renderWords();
    const allDone=correct.every(i=>state.selectedWords[i]===key);
    if(allDone){ stepDone(step,zin.uitleg[key]); }
  } else {
    shake(wordIndex);
    if(correct.length===0){
      showFeedback(false,`Er is geen ${step.naam.toLowerCase()} in deze zin. Gebruik de knop hieronder.`);
    } else {
      showFeedback(false,`Niet juist. Denk aan de naamval of de functie van de ${step.naam.toLowerCase()}.`);
    }
  }
}

function stepDone(step,uitlegTekst){
  state.completedSteps[step.key]=true;
  renderPills();
  if(uitlegTekst){
    showFeedback(true,uitlegTekst);
    setTimeout(()=>{ hideFeedback(); tryAutoAdvance(); },2000);
  } else {
    tryAutoAdvance();
  }
}

function tryAutoAdvance(){
  // Als alle woorden al een tag hebben, sla resterende stappen over en ga direct naar vertaling
  if(allWordsCovered()){
    // Markeer alle resterende stappen als voltooid
    PSOLMO.forEach(s=>{ state.completedSteps[s.key]=true; });
    renderPills();
    checkAllDone();
    return;
  }
  const keys=PSOLMO.map(s=>s.key);
  const cur=keys.indexOf(state.currentStepKey);
  for(let i=cur+1;i<keys.length;i++){
    if(!state.completedSteps[keys[i]]){
      state.currentStepKey=keys[i];
      renderPills(); loadStep(); return;
    }
  }
  checkAllDone();
}

function allWordsCovered(){
  const zin=state.zinnen[state.zinIndex];
  const n=zin.latijn.length;
  // Collect all indices that get a tag: selected words + A attr indices (auto-tagged)
  const tagged=new Set(Object.keys(state.selectedWords).map(Number));
  // A attrs get tagged when kern is tapped, so they're already in selectedWords.
  // Just check that every index 0..n-1 has a tag.
  for(let i=0;i<n;i++){
    if(!tagged.has(i)) return false;
  }
  return true;
}

function checkAllDone(){
  const allDone=PSOLMO.every(s=>state.completedSteps[s.key]);
  if(allDone){
    renderGloss();
    document.getElementById('glossSection').classList.add('show');
    document.getElementById('translationSection').style.display='block';
    document.getElementById('skipBtn').style.display='none';
    document.getElementById('stepLabel').textContent='Vertaling';
    document.getElementById('stepInstruction').textContent='Uitstekend! Gebruik de woordbetekenissen hieronder en schrijf je volledige Nederlandse vertaling.';
    document.getElementById('stepHint').textContent='';
    document.getElementById('instructionBox').style.borderLeftColor='var(--gold)';
    document.getElementById('stepLabel').style.color='var(--gold)';
    document.getElementById('progressFill').style.width=`${((state.zinIndex+0.8)/state.zinnen.length)*100}%`;
  }
}

function renderGloss(){
  const zin=state.zinnen[state.zinIndex];
  const grid=document.getElementById('glossGrid');
  grid.innerHTML='';
  zin.latijn.forEach((word,i)=>{
    const tag=state.selectedWords[i]||'none';
    const meaning=(zin.woorden&&zin.woorden[i])||'—';
    const card=document.createElement('div');
    card.className=`gloss-card gloss-${tag}`;
    const cleanWord=word.replace(/[.,;:?!…]+$/,'');
    card.innerHTML=`<span class="gloss-latin">${cleanWord}</span><span class="gloss-nl">${meaning}</span>`;
    grid.appendChild(card);
  });
}

// ============================================================
// SKIP STEP
// ============================================================
function skipStep(){
  const step=PSOLMO.find(s=>s.key===state.currentStepKey);
  const zin=state.zinnen[state.zinIndex];
  let hasContent=false;
  if(step.key==='S'){
    hasContent=(zin.psolmo.S.Sn.length>0||zin.psolmo.S.So.length>0);
  } else if(step.key==='A'){
    hasContent=(zin.psolmo.A&&zin.psolmo.A.length>0);
  } else if(step.key==='ACI'){
    hasContent=(zin.psolmo.ACI&&zin.psolmo.ACI.length>0);
  } else if(step.key==='ABLABS'){
    hasContent=(zin.psolmo.ABLABS&&zin.psolmo.ABLABS.length>0);
  } else if(step.key==='P'){
    hasContent=false;
  } else {
    hasContent=(zin.psolmo[step.key]&&zin.psolmo[step.key].length>0);
  }
  if(hasContent){
    showFeedback(false,`Er ${step.key==='A'?'zijn':'is'} wél ${step.key==='A'?'attribuutgroepen':'een '+step.naam.toLowerCase()} in deze zin. Zoek goed!`);
    return;
  }
  const uitleg=zin.uitleg[step.key];
  if(uitleg){ showFeedback(true,uitleg); setTimeout(()=>{ hideFeedback(); stepDone(step,''); },1800); }
  else { stepDone(step,''); }
}

// ============================================================
// TRANSLATION
// ============================================================
function submitTranslation(){
  const input=document.getElementById('translationInput').value.trim();
  if(!input) return;
  const zin=state.zinnen[state.zinIndex];
  state.results.push({latijn:zin.latijn.join(' '),context:zin.context,correcteVertaling:zin.vertaling,studentVertaling:input});
  const isLast=state.zinIndex>=state.zinnen.length-1;
  document.getElementById('sentenceResultContent').innerHTML=`
    <div class="result-card">
      <div class="sentence-latin">${zin.latijn.join(' ')}</div>
      <div class="result-row"><span class="result-label">Correct</span><span class="result-value">${zin.vertaling}</span></div>
      <hr class="divider">
      <div class="result-row"><span class="result-label">Jouw vertaling</span><span class="result-value student">${input}</span></div>
    </div>
    <p style="font-size:0.82rem;color:var(--ink-light);font-style:italic;margin-bottom:8px;">
      Vergelijk zelf: klopt de betekenis? Let op naamvallen, persoon en tijd.
    </p>`;
  document.getElementById('btnNextSentence').textContent=isLast?'Bekijk eindresultaat →':'Volgende zin →';
  showScreen('screenSentenceResult');
}

function nextSentence(){
  state.zinIndex++;
  if(state.zinIndex>=state.zinnen.length){ showLevelResult(); }
  else { loadZin(); showScreen('screenExercise'); }
}

// ============================================================
// LEVEL RESULT
// ============================================================
function showLevelResult(){
  document.getElementById('progressFill').style.width='100%';
  const msgs=["Zo goed als een consul! 🏛️","Caesar zou trots zijn. ⚔️","Bijna klaar voor het examen! 📜","Volharding is een Romeinse deugd. 💪","Optimus discipulus! ✨"];
  document.getElementById('scoreBanner').innerHTML=`
    <div class="score-num">${state.zinnen.length}</div>
    <div class="score-label">zinnen voltooid — Niveau ${state.level}</div>
    <div class="score-msg">${msgs[Math.floor(Math.random()*msgs.length)]}</div>`;
  const list=document.getElementById('levelResultList');
  list.innerHTML='<h3 style="font-family:\'Playfair Display\',serif;margin-bottom:12px;">Overzicht</h3>';
  state.results.forEach((r,i)=>{
    const card=document.createElement('div'); card.className='result-card';
    card.innerHTML=`<div style="font-size:0.72rem;color:var(--grey);margin-bottom:3px;">${i+1}. ${r.context}</div>
      <div class="sentence-latin" style="font-size:0.92rem;margin-bottom:7px;">${r.latijn}</div>
      <div class="result-row"><span class="result-label">Correct</span><span class="result-value">${r.correcteVertaling}</span></div>
      <div class="result-row"><span class="result-label">Jij</span><span class="result-value student">${r.studentVertaling}</span></div>`;
    list.appendChild(card);
  });
  showScreen('screenLevelResult');
  document.getElementById('headerBadge').textContent=`Niveau ${state.level} ✓`;
}
function retryLevel(){ startLevel(state.level); }

// ============================================================
// HELPERS
// ============================================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goToLevelSelect(){ renderLevelSelect(); }
function showFeedback(correct,tekst){
  const box=document.getElementById('feedbackBox');
  box.className=`feedback-box show ${correct?'correct':'incorrect'}`;
  box.innerHTML=`<strong>${correct?'✓ Goed!':'✗ Probeer opnieuw'}</strong>${tekst}`;
}
function hideFeedback(){
  const box=document.getElementById('feedbackBox');
  box.className='feedback-box'; box.innerHTML='';
}
function shake(wordIndex){
  const btn=document.querySelector(`.word-btn[data-index="${wordIndex}"]`);
  if(btn){ btn.classList.add('wrong'); setTimeout(()=>btn.classList.remove('wrong'),400); }
}
function tagLabel(tag){
  const map={P:'persoonsvorm',Sn:'nevenschikkend voegwoord',So:'onderschikkend voegwoord',
    A1:'attribuutgroep 1',A2:'attribuutgroep 2',A3:'attribuutgroep 3',A4:'attribuutgroep 4',A5:'attribuutgroep 5',
    O:'onderwerp',ACI:'AcI (accusativus)',L:'lijdend voorwerp',M:'meewerkend voorwerp',ABLABS:'ablativus absolutus',Rest:'overige bepaling'};
  return map[tag]||tag;
}
init();
