<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spellen">
<meta name="theme-color" content="#16110c">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23160f09'/%3E%3Cpath d='M90 24c18 7 47 11 47 11v54c0 47-29 68-47 79-18-11-47-32-47-79V35s29-4 47-11z' fill='%235a120c' stroke='%23d4af37' stroke-width='5'/%3E%3Ctext x='90' y='112' font-size='52' fill='%23f0cf6b' text-anchor='middle' font-family='Georgia,serif' font-weight='bold'%3E⚔%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<title>Spellen — KCV</title>
<style>
  :root{--gold:#d4af37;--goldb:#f0cf6b;--goldd:#9c7c1f;--ox:#5a120c;--cream:#f3e9d2;
        --muted:#b9a883;--s2:#221a12;--s3:#2f241a;--s4:#3d2f20;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'EB Garamond',Georgia,serif;min-height:100vh;color:var(--cream);
    background:radial-gradient(ellipse at 50% -10%,rgba(212,175,55,.10),transparent 55%),
               radial-gradient(ellipse at 50% 120%,rgba(168,38,26,.16),transparent 55%),
               linear-gradient(160deg,#120d08,#1c140d 45%,#160f09);
    background-attachment:fixed;padding:24px 16px 60px;}
  .wrap{max-width:860px;margin:0 auto}

  /* ── header ── */
  .top{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .back{width:42px;height:42px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    border-radius:11px;background:var(--s3);border:1px solid var(--s4);color:var(--gold);text-decoration:none}
  .back svg{width:20px;height:20px}
  .crest{width:46px;height:46px;flex:0 0 auto}
  .ttl{flex:1}
  .ttl h1{font-family:'Cinzel',serif;font-weight:800;color:var(--goldb);font-size:23px;letter-spacing:.03em;line-height:1}
  .ttl .s{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.28em;color:var(--muted);margin-top:4px;text-transform:uppercase}

  /* ── sectielabel ── */
  .sec-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.28em;color:var(--muted);
    text-transform:uppercase;margin:28px 0 14px;text-align:center;
    display:flex;align-items:center;gap:10px}
  .sec-label::before,.sec-label::after{content:'';flex:1;height:1px;
    background:linear-gradient(90deg,transparent,var(--goldd),transparent)}

  /* ── spel-kaart ── */
  .sp-card{background:linear-gradient(170deg,var(--s3),var(--s2));
    border:1px solid var(--s4);border-radius:16px;
    box-shadow:0 4px 16px rgba(0,0,0,.5);
    overflow:hidden;margin-bottom:20px}
  .sp-head{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;
    border-bottom:1px solid var(--s4)}
  .sp-ic{width:44px;height:44px;flex:0 0 auto;margin-top:2px}
  .sp-meta{flex:1}
  .sp-meta h2{font-family:'Cinzel',serif;font-size:17px;color:var(--cream);line-height:1.2;margin-bottom:3px}
  .sp-meta p{font-size:13px;color:var(--muted);line-height:1.4}
  .sp-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .tag{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;
    background:rgba(212,175,55,.12);color:var(--goldb);border:1px solid rgba(212,175,55,.3);
    border-radius:10px;padding:2px 8px}
  .sp-btn{flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    width:40px;height:40px;border-radius:10px;background:var(--s4);
    border:1px solid var(--goldd);color:var(--gold);text-decoration:none;font-size:18px;
    transition:background .15s;margin-top:2px}
  .sp-btn:active{background:var(--ox)}

  /* ── iframe wrapper ── */
  .sp-frame{width:100%;background:#0d0a06}
  .sp-frame iframe{display:block;width:100%;height:620px;border:none}

  /* Thinglink heeft soms een vaste verhouding nodig op kleine schermen */
  @media(max-width:600px){
    .sp-frame iframe{height:460px}
    .sp-meta h2{font-size:15px}
  }

  /* ── placeholder (nog geen iframe) ── */
  .sp-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;padding:40px 20px;color:var(--muted);font-style:italic;font-size:14px;
    border-top:1px solid var(--s4)}
  .sp-placeholder svg{opacity:.35}

  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:30px;font-style:italic}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <a class="back" href="../" aria-label="Terug">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <!-- schild-icoon -->
    <svg class="crest" viewBox="0 0 100 100">
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#c8392a"/><stop offset="100%" stop-color="#5a120c"/>
      </linearGradient></defs>
      <path d="M50 8c10 4 26 6 26 6v30c0 26-16 38-26 44C40 82 24 70 24 44V14s16-2 26-6z" fill="url(#g)" stroke="#d4af37" stroke-width="3"/>
      <!-- gekruiste zwaarden -->
      <line x1="36" y1="30" x2="64" y2="68" stroke="#f0cf6b" stroke-width="4" stroke-linecap="round"/>
      <line x1="64" y1="30" x2="36" y2="68" stroke="#f0cf6b" stroke-width="4" stroke-linecap="round"/>
      <circle cx="50" cy="49" r="5" fill="#5a120c" stroke="#f0cf6b" stroke-width="2"/>
    </svg>
    <div class="ttl"><h1>SPELLEN</h1><div class="s">Interactieve cultuurspellen</div></div>
  </div>


  <!-- ═══════════════════════════════════════════════
       SECTIE — TROJAANSE OORLOG
  ══════════════════════════════════════════════════ -->
<div class="sec-label">Trojaanse Oorlog</div>
<div class="sp-card">
  <div class="sp-head">
    <svg class="sp-ic" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="20" fill="rgba(212,175,55,.08)" stroke="#d4af37" stroke-width="1.2"/>
      <text x="22" y="30" font-size="22" text-anchor="middle" fill="#d4af37">🐴</text>
    </svg>
    <div class="sp-meta">
      <h2>De Trojaanse Oorlog</h2>
      <p>Verken de wereld van de Ilias via interactieve 360°-afbeeldingen. Klik op de hotspots voor uitleg, verhaalfragmenten en vragen.</p>
      <div class="sp-tags">
        <span class="tag">Thinglink</span>
        <span class="tag">360°</span>
        <span class="tag">Grieks</span>
        <span class="tag">Mythologie</span>
      </div>
    </div>
    <a class="sp-btn" title="Volledig scherm"
       href="https://www.thinglink.com/view/scene/1780974282004759396"
       target="_blank" rel="noopener">⛶</a>
  </div>
  <div class="sp-frame">
    <iframe
      src="https://www.thinglink.com/view/scene/1780974282004759396"
      allowfullscreen
      webkitallowfullscreen
      mozallowfullscreen
      allow="fullscreen; xr-spatial-tracking">
    </iframe>
  </div>
</div>

        <text x="22" y="30" font-size="22" text-anchor="middle" fill="#d4af37">🏛️</text>
      </svg>
      <div class="sp-meta">
        <h2>TITEL</h2>

  <footer>SPQR &middot; Klassieke Talen &middot; KCV &middot; Spellen</footer>

</html>
